<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Jadwal - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .excel-input { width: 100%; padding: 0.5rem; border: none; outline: none; background: transparent; }
        .excel-cell { border: 1px solid #e2e8f0; }
        .excel-cell:focus-within { outline: 2px solid #3b82f6; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    <aside class="w-72 bg-slate-900 text-white flex flex-col z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
            <h1 class="font-bold text-xl uppercase">Kamishibai</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="audit.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="file-edit" class="w-5 h-5"></i> Input Hasil Audit
            </a>
            <a href="jadwal.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">
                <i data-lucide="table-2" class="w-5 h-5"></i> Atur Jadwal
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-400 text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
            <h2 class="font-black text-lg text-slate-800 uppercase">ATUR JADWAL (EXCEL MODE)</h2>
        </header>
        <div class="p-8 overflow-y-auto space-y-6">
            <div class="bg-white p-6 rounded-[1.5rem] border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-bold">Input Baris Baru</h3>
                    <button onclick="addRow()" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold">+ Baris</button>
                </div>
                <table class="w-full border-collapse text-sm">
                    <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                        <tr>
                            <th class="p-3 border">#</th>
                            <th class="p-3 border">Group</th>
                            <th class="p-3 border">Tanggal</th>
                            <th class="p-3 border">Dept. Auditee</th>
                            <th class="p-3 border">Nama Auditor</th>
                        </tr>
                    </thead>
                    <tbody id="excel-body"></tbody>
                </table>
                <button class="mt-4 w-full bg-blue-600 text-white py-3 rounded-xl font-bold shadow-lg shadow-blue-100">Simpan Data</button>
            </div>
        </div>
    </main>

    <script>
        function addRow() {
            const body = document.getElementById('excel-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-2 border text-center text-xs">${body.children.length + 1}</td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="Group..."></td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="YYYY-MM-DD"></td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="Dept..."></td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="Nama..."></td>
            `;
            body.appendChild(row);
        }
        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        addRow(); addRow(); addRow();
        lucide.createIcons();
    </script>
</body>
</html>
