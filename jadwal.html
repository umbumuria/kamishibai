<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Audit - Kamishibai</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --border: rgba(255,255,255,0.1);
        }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif; background: transparent; color: white;
            padding: 20px; overflow-y: auto;
        }
        
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 12px; display: flex; justify-content: space-between; align-items: center; }

        /* --- EXCEL STYLE TABLE --- */
        .excel-container {
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border);
            overflow-x: auto; margin-bottom: 20px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(15, 23, 42, 0.5); padding: 12px; text-align: left; border-bottom: 2px solid var(--border); color: #94a3b8; }
        td { padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        .cell-input {
            width: 100%; border: none; background: transparent; color: white;
            padding: 12px; outline: none; box-sizing: border-box;
        }
        .cell-input:focus { background: rgba(59, 130, 246, 0.1); box-shadow: inset 0 0 0 1px var(--primary); }
        
        .btn-action {
            background: var(--primary); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-add { background: #10b981; margin-bottom: 10px; font-size: 12px; }

        /* --- HISTORY SECTION --- */
        .filter-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px; margin-bottom: 15px; background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 10px;
        }
        .filter-bar input, .filter-bar select {
            background: #0f172a; border: 1px solid var(--border); color: white; padding: 8px; border-radius: 6px; outline: none;
        }

        .history-table th { position: sticky; top: 0; z-index: 10; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-pending { background: #f59e0b; color: #000; }
        .badge-done { background: #10b981; color: #fff; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="section-title">
        INPUT JADWAL BARU
        <div style="font-size: 10px; font-weight: normal; color: #94a3b8;">*Klik sel pertama lalu Paste (Ctrl+V) dari Excel</div>
    </div>
    
    <button class="btn-action btn-add" onclick="addRow()">+ Tambah Baris</button>

    <div class="excel-container">
        <table id="inputTable">
            <thead>
                <tr>
                    <th width="150">PERIODE (YYYY-MM)</th>
                    <th>NAMA AUDITOR</th>
                    <th>DEPT. AUDITEE</th>
                    <th width="180">GROUP</th>
                    <th width="50">AKSI</th>
                </tr>
            </thead>
            <tbody id="inputBody">
                </tbody>
        </table>
    </div>
    <button class="btn-action" style="width: 100%; margin-bottom: 40px;" onclick="saveBulkData()">SIMPAN SEMUA DATA KE FIREBASE</button>

    <div class="section-title">HISTORY JADWAL AUDIT</div>
    
    <div class="filter-bar">
        <input type="text" id="filterAuditor" placeholder="Filter Auditor..." oninput="fetchHistory()">
        <input type="text" id="filterAuditee" placeholder="Filter Auditee..." oninput="fetchHistory()">
        <select id="filterGroup" onchange="fetchHistory()">
            <option value="">Semua Group</option>
            <option value="SF">SF</option>
            <option value="SP">SP</option>
            <option value="SUPPORTING">SUPPORTING</option>
        </select>
    </div>

    <div class="excel-container" style="max-height: 400px;">
        <table class="history-table">
            <thead>
                <tr>
                    <th>KODE UNIK</th>
                    <th>PERIODE</th>
                    <th>AUDITOR</th>
                    <th>AUDITEE</th>
                    <th>GROUP</th>
                    <th>STATUS</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
        authDomain: "kamishibaimsm.firebaseapp.com",
        projectId: "kamishibaimsm",
        storageBucket: "kamishibaimsm.firebasestorage.app",
        messagingSenderId: "184420389379",
        appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- LOGIKA EXCEL INPUT ---

    function addRow(data = ['', '', '', 'SF']) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="month" class="cell-input" value="${data[0]}"></td>
            <td><input type="text" class="cell-input" placeholder="..." value="${data[1]}"></td>
            <td><input type="text" class="cell-input" placeholder="..." value="${data[2]}"></td>
            <td>
                <select class="cell-input">
                    <option value="SF" ${data[3] === 'SF' ? 'selected' : ''}>SUGAR FACTORY</option>
                    <option value="SP" ${data[3] === 'SP' ? 'selected' : ''}>PLANTATION</option>
                    <option value="SUPPORTING" ${data[3] === 'SUPPORTING' ? 'selected' : ''}>SUPPORTING</option>
                </select>
            </td>
            <td style="text-align:center"><button onclick="this.parentElement.parentElement.remove()" style="background:none; border:none; color:#ef4444; cursor:pointer;">✕</button></td>
        `;
        document.getElementById('inputBody').appendChild(tr);
    }

    // Handle Paste Event
    document.addEventListener('paste', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') {
            const data = e.clipboardData.getData('text');
            const rows = data.split('\n').filter(row => row.trim() !== '');
            
            if (rows.length > 1 || rows[0].split('\t').length > 1) {
                e.preventDefault();
                rows.forEach(row => {
                    const cols = row.split('\t');
                    addRow([cols[0] || '', cols[1] || '', cols[2] || '', cols[3] || 'SF']);
                });
            }
        }
    });

    async function saveBulkData() {
        const rows = document.querySelectorAll('#inputBody tr');
        if (rows.length === 0) return alert("Tambahkan data terlebih dahulu!");

        const batch = db.batch();
        let count = 0;

        rows.forEach(row => {
            const inputs = row.querySelectorAll('.cell-input');
            const periode = inputs[0].value;
            const auditor = inputs[1].value;
            const auditee = inputs[2].value;
            const group = inputs[3].value;

            if (periode && auditor && auditee) {
                const [tahun, bulan] = periode.split('-');
                const cleanAuditor = auditor.replace(/\s+/g, '').toUpperCase();
                const cleanAuditee = auditee.replace(/\s+/g, '').toUpperCase();
                const kodeUnik = `${bulan}${tahun}-${cleanAuditor}-${cleanAuditee}-${group}`;

                const ref = db.collection('jadwal_audit').doc(kodeUnik);
                batch.set(ref, {
                    periode, auditor, auditee, group, kodeUnik,
                    status: "Pending",
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                count++;
            }
        });

        try {
            await batch.commit();
            alert(`Berhasil menyimpan ${count} jadwal!`);
            document.getElementById('inputBody').innerHTML = '';
            addRow();
            fetchHistory();
        } catch (err) {
            console.error(err);
            alert("Gagal menyimpan data.");
        }
    }

    // --- LOGIKA HISTORY ---

    async function fetchHistory() {
        const auditorVal = document.getElementById('filterAuditor').value.toLowerCase();
        const auditeeVal = document.getElementById('filterAuditee').value.toLowerCase();
        const groupVal = document.getElementById('filterGroup').value;

        const snapshot = await db.collection('jadwal_audit')
            .orderBy('createdAt', 'desc')
            .limit(50)
            .get();

        const historyBody = document.getElementById('historyBody');
        historyBody.innerHTML = '';

        snapshot.forEach(doc => {
            const d = doc.data();
            
            // Client-side filtering
            if (d.auditor.toLowerCase().includes(auditorVal) && 
                d.auditee.toLowerCase().includes(auditeeVal) &&
                (groupVal === "" || d.group === groupVal)) {
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="color:var(--primary); font-family:monospace; padding:12px;">${d.kodeUnik}</td>
                    <td>${d.periode}</td>
                    <td>${d.auditor}</td>
                    <td>${d.auditee}</td>
                    <td>${d.group}</td>
                    <td><span class="badge ${d.status === 'Pending' ? 'badge-pending' : 'badge-done'}">${d.status}</span></td>
                `;
                historyBody.appendChild(tr);
            }
        });
    }

    // Initial State
    addRow();
    fetchHistory();
</script>
</body>
</html>
