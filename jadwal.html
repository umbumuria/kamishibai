<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur Jadwal - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .excel-input { width: 100%; padding: 0.75rem; border: none; outline: none; background: transparent; min-width: 140px; font-size: 0.875rem; }
        .excel-cell { border: 1px solid #e2e8f0; }
        .excel-cell:focus-within { background-color: #f8fafc; outline: 2px solid #3b82f6; z-index: 10; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 1024px) {
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #sidebar.show-mobile { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 bg-slate-900 text-white flex flex-col z-50 hidden-mobile lg:transform-none">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl uppercase tracking-tighter">Kamishibai</h1>
            </div>
            <button onclick="toggleMenu()" class="lg:hidden text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="audit.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="file-edit" class="w-5 h-5"></i> Input Hasil Audit
            </a>
            <a href="jadwal.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">
                <i data-lucide="table-2" class="w-5 h-5"></i> Atur Jadwal
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-400 hover:bg-red-400/10 rounded-xl text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 px-4 sm:px-8 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="lg:hidden p-2 bg-slate-100 rounded-lg text-slate-600"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <h2 class="font-black text-sm sm:text-lg text-slate-800 uppercase tracking-tight">ATUR JADWAL</h2>
            </div>
        </header>

        <div class="p-4 sm:p-8 flex-1 overflow-y-auto">
            <div class="bg-white rounded-[1.5rem] sm:rounded-[2rem] border border-slate-200 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                    <div>
                        <h3 class="font-bold text-slate-800">Manajemen Jadwal</h3>
                        <p class="text-xs text-slate-400 mt-1">Gunakan tabel di bawah untuk input massal</p>
                    </div>
                    <button onclick="addRow()" class="w-full sm:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-colors">
                        <i data-lucide="plus" class="w-4 h-4"></i> Tambah Baris
                    </button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full border-collapse">
                        <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                            <tr>
                                <th class="p-4 border text-center w-12">#</th>
                                <th class="p-4 border text-left">Group</th>
                                <th class="p-4 border text-left">Tanggal</th>
                                <th class="p-4 border text-left">Dept. Auditee</th>
                                <th class="p-4 border text-left">Nama Auditor</th>
                                <th class="p-4 border text-center w-16">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="excel-body"></tbody>
                    </table>
                </div>

                <div class="p-6 bg-slate-50 border-t border-slate-200">
                    <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl shadow-blue-100 transition-all active:scale-[0.98]">
                        Simpan Semua Perubahan
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('sidebar-closed');
    sidebar.classList.toggle('sidebar-open');
    overlay.classList.toggle('hidden');
}
        }

        function addRow() {
            const body = document.getElementById('excel-body');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-2 border text-center text-xs text-slate-400">${body.children.length + 1}</td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="A/B/C..."></td>
                <td class="excel-cell"><input type="date" class="excel-input"></td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="Nama Dept..."></td>
                <td class="excel-cell"><input type="text" class="excel-input" placeholder="Nama Auditor..."></td>
                <td class="p-2 border text-center">
                    <button onclick="this.parentElement.parentElement.remove()" class="text-red-400 hover:text-red-600 p-1">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </td>
            `;
            body.appendChild(row);
            lucide.createIcons();
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        // Inisialisasi awal 3 baris
        for(let i=0; i<3; i++) addRow();
        lucide.createIcons();
    </script>
</body>
</html>
