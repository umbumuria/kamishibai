<div id="dashboard-module">
    <div class="section-title">DASHBOARD ANALISA KAMISHIBAI</div>

    <div class="container" style="margin-bottom: 20px;">
        <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));">
            <div>
                <label>Group Unit</label>
                <select id="dashFilterGroup" onchange="applyDashFilters()">
                    <option value="">Semua Group</option>
                    <option value="SF">SUGAR FACTORY (SF)</option>
                    <option value="SP">PLANTATION (SP)</option>
                    <option value="SUPPORTING">SUPPORTING</option>
                </select>
            </div>
            <div>
                <label>Auditor</label>
                <select id="dashFilterAuditor" onchange="applyDashFilters()">
                    <option value="">Semua Auditor</option>
                </select>
            </div>
            <div>
                <label>Periode Bulan</label>
                <input type="month" id="dashFilterMonth" onchange="applyDashFilters()">
            </div>
            <div style="display: flex; align-items: flex-end;">
                <button onclick="resetDashFilters()" style="width:100%; height:48px; background:#f1f5f9; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-weight:bold; margin-bottom:15px;">RESET</button>
            </div>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-bottom: 20px;">
        <div class="card-stat">
            <label>Total Audit</label>
            <div class="value" id="valTotal">0</div>
        </div>
        <div class="card-stat">
            <label>Avg Kepatuhan</label>
            <div class="value" id="valAvg" style="color: var(--primary);">0%</div>
        </div>
        <div class="card-stat">
            <label>Temuan OPEN</label>
            <div class="value" id="valOpen" style="color: #ef4444;">0</div>
        </div>
    </div>

    <div class="grid" style="grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 30px;">
        <div class="container" style="margin-bottom:0;">
            <label>Tren Performa per Group</label>
            <canvas id="chartTrend" height="150"></canvas>
        </div>
        <div class="container" style="margin-bottom:0;">
            <label>Rasio Status Perbaikan</label>
            <canvas id="chartStatus"></canvas>
        </div>
    </div>

    <div class="section-title" style="font-size: 14px;">DAFTAR TEMUAN OPEN (OUTSTANDING)</div>
    <div class="table-container">
        <table id="tableOpen">
            <thead>
                <tr>
                    <th>TGL</th>
                    <th>UNIT / DEPT</th>
                    <th>URAIAN TEMUAN</th>
                    <th>RENCANA PERBAIKAN</th>
                    <th>AUDITOR</th>
                </tr>
            </thead>
            <tbody id="bodyOpen">
                </tbody>
        </table>
    </div>
</div>

<style>
    /* Tambahan Style khusus Dashboard agar match dengan SPA */
    .card-stat { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
    .card-stat .value { font-size: 24px; font-weight: bold; margin-top: 5px; }
    #dashboard-module .container { padding: 15px; background: white; border-radius: 12px; border: 1px solid var(--border); }
    canvas { width: 100% !important; }
</style>
