<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Audit Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-blue-600 p-4 rounded-2xl text-white mb-4 shadow-xl shadow-blue-100">
                    <i data-lucide="clipboard-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Audit Kamishibai</h2>
                <p class="text-slate-400 text-sm mt-1">Masuk ke sistem manajemen audit</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Role Akses</label>
                    <select id="login-role" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none">
                        <option value="user">Operator (User)</option>
                        <option value="admin">Administrator (Admin)</option>
                    </select>
                </div>
                <div id="password-container" class="hidden">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" id="login-password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Password admin...">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-[0.98]">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden flex min-h-screen relative overflow-x-hidden">
        <aside class="fixed inset-y-0 left-0 w-72 bg-slate-900 text-white flex flex-col z-50 -translate-x-full lg:translate-x-0 lg:static lg:h-screen flex-shrink-0">
            <div class="p-8 flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl text-white"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl tracking-tight">Kamishibai</h1>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="navigate('input-jadwal')" id="nav-input-jadwal" class="nav-item admin-only w-full hidden flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i data-lucide="calendar-plus" class="w-5 h-5"></i> Atur Jadwal
                </button>
            </nav>
            <div class="p-6 mt-auto">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors font-medium text-sm">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
                </button>
            </div>
        </aside>

        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white border-b border-slate-200 px-6 flex items-center justify-between sticky top-0 z-40">
                <h2 id="page-title" class="font-bold text-lg text-slate-800 uppercase">DASHBOARD</h2>
                <div id="sync-indicator" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                    <div class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></div>
                    Menghubungkan...
                </div>
            </header>

            <main class="p-6 lg:p-10 max-w-7xl mx-auto w-full">
                <div id="page-dashboard" class="page-view space-y-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm inline-block min-w-[250px]">
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total Jadwal</p>
                        <h3 id="stat-total-sch" class="text-4xl font-black text-slate-900 mt-2">0</h3>
                    </div>
                </div>

                <div id="page-input-jadwal" class="page-view hidden space-y-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                        <div class="flex items-center justify-between mb-6">
                            <h3 class="font-bold text-slate-800">Tambah Jadwal Baru</h3>
                            <span id="draft-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest hidden italic">Draft Tersimpan Otomatis</span>
                        </div>
                        <form id="schedule-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">TANGGAL</label><input type="date" id="sch-date" class="draft-input w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" required></div>
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">AREA</label><input type="text" id="sch-area" class="draft-input w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" placeholder="Area Audit" required></div>
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">AUDITOR</label><input type="text" id="sch-auditor" class="draft-input w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" placeholder="Nama Auditor" required></div>
                            <button type="submit" id="btn-submit" class="bg-blue-600 text-white font-bold h-[56px] rounded-2xl hover:bg-blue-700 disabled:opacity-50">Simpan Jadwal</button>
                        </form>
                    </div>

                    <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest">
                                <tr><th class="px-8 py-5">No</th><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Area</th><th class="px-8 py-5">Auditor</th><th class="px-8 py-5">Aksi</th></tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100">
                                <tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">Memuat database...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
            authDomain: "kamishibaimsm.firebaseapp.com",
            projectId: "kamishibaimsm",
            storageBucket: "kamishibaimsm.firebasestorage.app",
            messagingSenderId: "184420389379",
            appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "kamishibaimsm"; 

        let user = null;
        let schedules = [];

        // --- CORE LOGIC ---

        async function initFirebase() {
            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Firebase Auth Error:", error.code);
                updateSyncStatus('Auth Failed', 'bg-red-500');
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                updateSyncStatus('Terhubung', 'bg-green-500');
                startListening();
                restoreSession(); // Cek sesi saat login berhasil
            } else {
                updateSyncStatus('Menghubungkan...', 'bg-slate-300 animate-pulse');
            }
        });

        function startListening() {
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
            onSnapshot(colRef, (snapshot) => {
                schedules = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTable();
                updateDashboard();
            }, (err) => {
                console.error("Firestore Error:", err);
            });
        }

        async function saveSchedule(e) {
            e.preventDefault();
            if (!user) return alert("Belum terhubung ke server.");

            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerText = "Proses...";

            const data = {
                date: document.getElementById('sch-date').value,
                area: document.getElementById('sch-area').value,
                auditor: document.getElementById('sch-auditor').value,
                createdAt: serverTimestamp()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                await addDoc(colRef, data);
                
                // Bersihkan draf setelah berhasil simpan
                localStorage.removeItem('kamishibai_draft');
                document.getElementById('draft-status').classList.add('hidden');
                e.target.reset();
            } catch (err) {
                alert("Gagal simpan: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan Jadwal";
            }
        }

        // --- AUTO SAVE & SESSION LOGIC ---

        // Simpan posisi halaman & draf saat input berubah
        function saveSessionState() {
            const draft = {
                date: document.getElementById('sch-date').value,
                area: document.getElementById('sch-area').value,
                auditor: document.getElementById('sch-auditor').value
            };
            localStorage.setItem('kamishibai_draft', JSON.stringify(draft));
            
            // Tampilkan indikator draft jika ada isi
            const hasContent = Object.values(draft).some(val => val !== "");
            document.getElementById('draft-status').classList.toggle('hidden', !hasContent);
        }

        function restoreSession() {
            // 1. Kembalikan Posisi Halaman
            const lastPage = localStorage.getItem('kamishibai_last_page');
            const isLoggedIn = localStorage.getItem('kamishibai_logged_in');
            const userRole = localStorage.getItem('kamishibai_role');

            if (isLoggedIn === 'true') {
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                if (userRole === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                }

                if (lastPage) navigate(lastPage, false);
            }

            // 2. Kembalikan Draf Form
            const savedDraft = localStorage.getItem('kamishibai_draft');
            if (savedDraft) {
                const draft = JSON.parse(savedDraft);
                document.getElementById('sch-date').value = draft.date || "";
                document.getElementById('sch-area').value = draft.area || "";
                document.getElementById('sch-auditor').value = draft.auditor || "";
                
                const hasContent = Object.values(draft).some(val => val !== "");
                document.getElementById('draft-status').classList.toggle('hidden', !hasContent);
            }
        }

        // --- UI HELPERS ---

        window.navigate = (page, saveToStorage = true) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById('page-title').innerText = page.toUpperCase().replace('-', ' ');
            
            // Update Nav Style
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white');
                btn.classList.add('text-slate-400');
            });
            const activeNav = document.getElementById(`nav-${page}`);
            if (activeNav) {
                activeNav.classList.add('bg-blue-600', 'text-white');
                activeNav.classList.remove('text-slate-400');
            }

            if (saveToStorage) localStorage.setItem('kamishibai_last_page', page);
        };

        window.logout = () => {
            localStorage.clear();
            location.reload();
        };

        window.deleteSchedule = async (id) => {
            if(!confirm("Hapus jadwal ini?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id));
            } catch (err) { alert("Gagal hapus data."); }
        };

        function renderTable() {
            const body = document.getElementById('table-body');
            if (schedules.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">Database Kosong</td></tr>`;
                return;
            }
            body.innerHTML = schedules.map((s, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="px-8 py-5 text-sm text-slate-400">${i+1}</td>
                    <td class="px-8 py-5 text-sm font-medium text-slate-600">${s.date}</td>
                    <td class="px-8 py-5 text-sm font-bold text-slate-800">${s.area}</td>
                    <td class="px-8 py-5 text-sm text-slate-600">${s.auditor}</td>
                    <td class="px-8 py-5">
                        <button onclick="deleteSchedule('${s.id}')" class="text-red-400 hover:text-red-600">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateDashboard() {
            document.getElementById('stat-total-sch').innerText = schedules.length;
        }

        function updateSyncStatus(msg, color) {
            const indicator = document.getElementById('sync-indicator');
            indicator.innerHTML = `<div class="w-2 h-2 rounded-full ${color}"></div> ${msg}`;
        }

        // --- EVENT LISTENERS ---

        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const role = document.getElementById('login-role').value;
            localStorage.setItem('kamishibai_logged_in', 'true');
            localStorage.setItem('kamishibai_role', role);
            
            if(role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            }
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('login-role').onchange = (e) => {
            document.getElementById('password-container').classList.toggle('hidden', e.target.value !== 'admin');
        };

        // Pasang event auto-save pada form input
        document.querySelectorAll('.draft-input').forEach(input => {
            input.addEventListener('input', saveSessionState);
        });

        document.getElementById('schedule-form').onsubmit = saveSchedule;

        initFirebase();
        lucide.createIcons();
    </script>
</body>
</html>
