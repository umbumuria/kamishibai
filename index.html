<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamishibai MSM System</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
    
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            margin: 0; 
            overflow: hidden; 
            background: #0f172a;
            height: 100dvh; 
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 350px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 4px solid #3b82f6;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .logo { width: 75px; height: auto; margin-bottom: 10px; }
        .title { font-size: 19px; font-weight: 800; letter-spacing: 1px; margin-bottom: 5px; }
        .subtitle { font-size: 10px; opacity: 0.7; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;}

        .input-group { text-align: left; margin-bottom: 15px; transition: 0.3s; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 6px; color: #cbd5e1; margin-left: 4px; font-weight: 600;}
        
        /* Styling Select & Input */
        select, input {
            width: 100%;
            height: 50px;
            padding: 0 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(15, 23, 42, 0.9);
            color: white;
            outline: none;
            font-size: 16px;
            appearance: none; /* Hilangkan arrow default */
            -webkit-appearance: none;
        }

        /* Custom Arrow untuk Select */
        .select-wrapper { position: relative; }
        .select-wrapper::after {
            content: "▼";
            font-size: 10px;
            position: absolute;
            right: 15px;
            top: 20px;
            color: #3b82f6;
            pointer-events: none;
        }

        input:focus, select:focus { border-color: #3b82f6; background: #0f172a; }

        button {
            width: 100%;
            height: 50px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            cursor: pointer;
        }
        button:active { transform: scale(0.97); background: #2563eb; }

        .footer { margin-top: 25px; font-size: 9px; opacity: 0.5; line-height: 1.5; }
        
        /* Hidden Class untuk menghilangkan Password */
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="status-dots">
                <div class="dot green"></div>
                <div class="dot red"></div>
                <div class="dot green"></div>
            </div>

            <img class="logo" src="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png" alt="Logo">
            
            <div class="title">AUDIT KAMISHIBAI</div>
            <div class="subtitle">MSM SP/SF/SUPPORTING</div>
            
            <div class="input-group">
                <label>PILIH USER</label>
                <div class="select-wrapper">
                    <select id="username" onchange="togglePassword()">
                        <option value="auditor">AUDITOR</option>
                        <option value="admin">ADMIN</option>
                    </select>
                </div>
            </div>

            <div class="input-group hidden" id="pwd-group">
                <label>PASSWORD ADMIN</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button onclick="loginLokal()">Masuk Sistem</button>
            
            <div class="footer">
                SISTEM KONTROL KUALITAS MSM<br>
               © 2025 Arifianto Hidayat. All rights reserved
            </div>
        </div>
    </div>

    <script>
        // Fungsi untuk menyembunyikan/menampilkan password
        function togglePassword() {
            const user = document.getElementById("username").value;
            const pwdGroup = document.getElementById("pwd-group");
            
            if (user === "admin") {
                pwdGroup.classList.remove("hidden");
            } else {
                pwdGroup.classList.add("hidden");
                document.getElementById("password").value = ""; // Reset isi pwd jika pindah ke auditor
            }
        }

        function loginLokal() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            // Logika Login
            if (user === "admin") {
                if (pass === "admin123") {
                    window.location.href = "dashboard-admin.html";
                } else {
                    alert("Password Admin Salah!");
                }
            } else if (user === "auditor") {
                // Auditor langsung masuk tanpa password sesuai permintaan
                window.location.href = "dashboard-auditor.html";
            }
        }

        // Jalankan toggle saat halaman dimuat pertama kali
        window.onload = togglePassword;
    </script>
</body>
</html>
