<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Audit Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- LOGIN PAGE -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-blue-600 p-4 rounded-2xl text-white mb-4 shadow-xl shadow-blue-100">
                    <i data-lucide="clipboard-check" class="w-8 h-8"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Audit Kamishibai</h2>
                <p class="text-slate-400 text-sm mt-1">Masuk ke sistem manajemen audit</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Role Akses</label>
                    <select id="login-role" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none">
                        <option value="user">Operator (User)</option>
                        <option value="admin">Administrator (Admin)</option>
                    </select>
                </div>
                <div id="password-container" class="hidden">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
                    <input type="password" id="login-password" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Password admin...">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-[0.98]">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden flex min-h-screen relative overflow-x-hidden">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 text-white flex flex-col z-50 -translate-x-full lg:translate-x-0 lg:static lg:h-screen flex-shrink-0">
            <div class="p-8 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl text-white"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                    <h1 class="font-bold text-xl tracking-tight">Kamishibai</h1>
                </div>
            </div>
            <nav class="flex-1 px-4 space-y-2">
                <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm bg-blue-600 text-white shadow-lg">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="navigate('input-audit')" id="nav-input-audit" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i data-lucide="clipboard-check" class="w-5 h-5"></i> Input Audit
                </button>
                <button onclick="navigate('input-jadwal')" id="nav-input-jadwal" class="nav-item admin-only w-full hidden flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-sm text-slate-400 hover:bg-slate-800 hover:text-white">
                    <i data-lucide="calendar-plus" class="w-5 h-5"></i> Atur Jadwal
                </button>
            </nav>
            <div class="p-6 mt-auto">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors font-medium text-sm">
                    <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
                </button>
            </div>
        </aside>

        <!-- CONTENT -->
        <div class="flex-1 flex flex-col min-w-0">
            <header class="h-20 bg-white border-b border-slate-200 px-6 flex items-center justify-between sticky top-0 z-40">
                <h2 id="page-title" class="font-bold text-lg text-slate-800">Dashboard</h2>
                <div id="sync-indicator" class="flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
                    <div class="w-2 h-2 rounded-full bg-slate-300 animate-pulse"></div>
                    Connecting...
                </div>
            </header>

            <main class="p-6 lg:p-10 max-w-7xl mx-auto w-full">
                <!-- Page Dashboard -->
                <div id="page-dashboard" class="page-view space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="stats-container">
                        <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm flex items-center justify-between">
                            <div><p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total Jadwal</p><h3 id="stat-total-sch" class="text-4xl font-black text-slate-900 mt-2">0</h3></div>
                            <div class="bg-blue-50 text-blue-600 p-5 rounded-2xl"><i data-lucide="calendar" class="w-7 h-7"></i></div>
                        </div>
                    </div>
                </div>

                <!-- Page Input Jadwal -->
                <div id="page-input-jadwal" class="page-view hidden space-y-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                        <h3 class="font-bold text-slate-800 mb-6">Tambah Jadwal Baru</h3>
                        <form id="schedule-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">TANGGAL</label><input type="date" id="sch-date" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" required></div>
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">AREA</label><input type="text" id="sch-area" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" placeholder="Contoh: Line 1" required></div>
                            <div><label class="text-[10px] font-black text-slate-400 mb-1 block">AUDITOR</label><input type="text" id="sch-auditor" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm" placeholder="Nama PIC" required></div>
                            <button type="submit" id="btn-submit-sch" class="bg-blue-600 text-white font-bold h-[56px] rounded-2xl hover:bg-blue-700 disabled:opacity-50 transition-opacity">Simpan Jadwal</button>
                        </form>
                    </div>

                    <div class="bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest">
                                <tr><th class="px-8 py-5">No</th><th class="px-8 py-5">Tanggal</th><th class="px-8 py-5">Area</th><th class="px-8 py-5">Auditor</th><th class="px-8 py-5">Aksi</th></tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100">
                                <tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">Memuat data...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Page Input Audit -->
                <div id="page-input-audit" class="page-view hidden">
                    <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 max-w-xl mx-auto shadow-sm text-center">
                        <div class="bg-orange-50 text-orange-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="construction" class="w-8 h-8"></i>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Halaman Audit</h2>
                        <p class="text-slate-500 mt-2">Halaman ini sedang dalam pengembangan.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
            authDomain: "kamishibaimsm.firebaseapp.com",
            projectId: "kamishibaimsm",
            storageBucket: "kamishibaimsm.firebasestorage.app",
            messagingSenderId: "184420389379",
            appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "kamishibaimsm"; 

        let schedules = [];
        let user = null;

        // 1. Auth Setup
        async function startApp() {
            try {
                // Pastikan menunggu sign in selesai
                const userCredential = await signInAnonymously(auth);
                user = userCredential.user;
                console.log("Logged in as:", user.uid);
            } catch (err) {
                console.error("Auth failed", err);
                updateSyncIndicator('Auth Error', 'bg-red-500');
            }
        }

        onAuthStateChanged(auth, (u) => {
            user = u;
            if (user) {
                updateSyncIndicator('Online', 'bg-green-500');
                listenToSchedules();
            } else {
                updateSyncIndicator('Disconnected', 'bg-slate-300');
            }
        });

        // 2. Firestore Listeners
        function listenToSchedules() {
            if (!user) return;
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
            
            // Tambahkan error callback pada onSnapshot
            onSnapshot(colRef, (snapshot) => {
                schedules = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderTable();
                updateDashboard();
            }, (err) => {
                console.error("Firestore Listen Error:", err);
                if(err.code === 'permission-denied') {
                    updateSyncIndicator('Permission Denied', 'bg-red-500');
                }
            });
        }

        // 3. Save Function
        async function handleSaveSchedule(e) {
            e.preventDefault();
            
            if (!user) {
                // Mencoba login ulang jika user hilang
                updateSyncIndicator('Reconnecting...', 'bg-orange-400');
                try {
                    await signInAnonymously(auth);
                } catch(err) {
                    alert("Koneksi gagal. Periksa koneksi internet Anda.");
                    return;
                }
            }

            const btn = document.getElementById('btn-submit-sch');
            btn.disabled = true;
            btn.innerText = "Menyimpan...";

            const date = document.getElementById('sch-date').value;
            const area = document.getElementById('sch-area').value;
            const auditor = document.getElementById('sch-auditor').value;

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'schedules');
                await addDoc(colRef, {
                    date,
                    area,
                    auditor,
                    timestamp: serverTimestamp()
                });
                e.target.reset();
            } catch (err) {
                console.error("Save Error:", err);
                alert("Gagal menyimpan ke Firebase. Pastikan Rules Firestore sudah disetel ke Public.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Simpan Jadwal";
            }
        }

        // 4. Delete Function
        window.deleteSchedule = async (id) => {
            if(!confirm("Hapus data ini?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'schedules', id));
            } catch (err) {
                alert("Gagal menghapus: " + err.message);
            }
        };

        // UI Helpers
        function renderTable() {
            const body = document.getElementById('table-body');
            if (schedules.length === 0) {
                body.innerHTML = `<tr><td colspan="5" class="px-8 py-10 text-center text-slate-400 italic">Belum ada data di database</td></tr>`;
                return;
            }
            body.innerHTML = schedules.map((s, i) => `
                <tr class="hover:bg-slate-50">
                    <td class="px-8 py-5 text-sm text-slate-400">${i+1}</td>
                    <td class="px-8 py-5 text-sm font-medium text-slate-600">${s.date || '-'}</td>
                    <td class="px-8 py-5 text-sm font-bold text-slate-800">${s.area || '-'}</td>
                    <td class="px-8 py-5 text-sm text-slate-600">${s.auditor || '-'}</td>
                    <td class="px-8 py-5">
                        <button onclick="deleteSchedule('${s.id}')" class="text-red-400 hover:text-red-600 transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateDashboard() {
            const el = document.getElementById('stat-total-sch');
            if (el) el.innerText = schedules.length;
        }

        function updateSyncIndicator(text, colorClass) {
            const span = document.querySelector('#sync-indicator');
            if (!span) return;
            span.innerHTML = `<div class="w-2 h-2 rounded-full ${colorClass}"></div> ${text}`;
        }

        // Navigation
        window.navigate = (pageId) => {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            const activeNav = document.getElementById(`nav-${pageId}`);
            if(activeNav) activeNav.classList.add('bg-blue-600', 'text-white');
            
            document.getElementById('page-title').innerText = pageId.replace('-', ' ').toUpperCase();
        };

        window.logout = () => {
            location.reload();
        };

        // Form Event
        document.getElementById('schedule-form').addEventListener('submit', handleSaveSchedule);
        
        // Simple Login
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            const role = document.getElementById('login-role').value;
            if (role === 'admin') {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
            }
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            lucide.createIcons();
        };

        document.getElementById('login-role').onchange = (e) => {
            document.getElementById('password-container').classList.toggle('hidden', e.target.value !== 'admin');
        };

        // Jalankan inisialisasi
        startApp();
        lucide.createIcons();
    </script>
</body>
</html>
