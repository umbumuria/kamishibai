<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-md border border-slate-100 text-center">
        <div class="inline-block bg-blue-600 p-4 rounded-2xl text-white mb-6 shadow-lg shadow-blue-100">
            <i data-lucide="clipboard-check" class="w-8 h-8"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Audit Kamishibai</h2>
        <p class="text-slate-400 text-sm mt-1 mb-8">Masuk ke sistem manajemen audit</p>
        <form id="login-form" class="space-y-5 text-left">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1 tracking-widest">Role Akses</label>
                <select id="login-role" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                    <option value="user">Auditor</option>
                    <option value="admin">Administrator (Admin)</option>
                </select>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">Masuk Sistem</button>
        </form>
    </div>
    <script>
        document.getElementById('login-form').onsubmit = (e) => {
            e.preventDefault();
            localStorage.setItem('kamishibai_role', document.getElementById('login-role').value);
            window.location.href = 'dashboard.html';
        };
        lucide.createIcons();
    </script>
</body>
</html>
