<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIQA System - SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sidebar-width: 260px; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; overflow: hidden; }
        
        /* Sidebar Styling */
        #sidebar { 
            width: var(--sidebar-width); 
            transition: transform 0.3s ease; 
            z-index: 50;
        }
        .sidebar-hide { transform: translateX(-100%); }
        
        /* Main Content Styling */
        #main-wrapper { 
            transition: margin-left 0.3s ease; 
            min-height: 100vh;
        }
        
        @media (min-width: 1024px) {
            .content-shifted { margin-left: var(--sidebar-width); }
        }

        /* Smooth Transition for Content */
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl border border-white/20 shadow-2xl w-full max-w-md text-center">
            <h2 class="text-white text-3xl font-bold mb-2">CIQA</h2>
            <p class="text-slate-400 mb-8">Continuous Improvement & Quality Assurance</p>
            
            <div class="space-y-4 text-left">
                <label class="text-slate-300 text-sm ml-1">Pilih Role Access</label>
                <select id="login-role" class="w-full p-4 rounded-xl bg-slate-800 text-white border border-slate-700 outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="auditor">Auditor</option>
                    <option value="admin">Admin</option>
                </select>
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 rounded-xl bg-slate-800 text-white border border-slate-700 outline-none">
                <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition shadow-lg shadow-blue-900/20">Login Sekarang</button>
            </div>
        </div>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 bg-slate-900 text-white sidebar-hide flex flex-col">
        <div class="p-8 text-center border-b border-slate-800">
            <h1 class="text-xl font-bold tracking-widest text-blue-400">CIQA SYSTEM</h1>
            <p id="display-role" class="text-[10px] text-slate-500 uppercase mt-1">Role</p>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="loadContent('dashboard.html')" class="w-full flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl transition">
                <span>🏠</span> Dashboard
            </button>
            <button onclick="loadContent('audit.html')" class="w-full flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl transition">
                <span>📝</span> Audit
            </button>
            <div id="menu-admin-only" class="hidden pt-4 border-t border-slate-800">
                <button onclick="loadContent('jadwal.html')" class="w-full flex items-center gap-3 p-3 hover:bg-slate-800 rounded-xl transition">
                    <span>📅</span> Jadwal
                </button>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <button onclick="handleLogout()" class="w-full p-3 text-red-400 hover:bg-red-400/10 rounded-xl transition flex items-center gap-3">
                <span>🚪</span> Keluar
            </button>
        </div>
    </aside>

    <div id="main-wrapper" class="flex flex-col h-screen">
        <header id="topbar" class="hidden h-16 bg-white border-b items-center px-6 sticky top-0 z-40">
            <button onclick="toggleSidebar()" class="p-2 hover:bg-slate-100 rounded-lg text-xl">☰</button>
            <h2 id="current-page-title" class="ml-4 font-bold text-slate-700 uppercase">Dashboard</h2>
        </header>

        <div id="content-container" class="p-6 lg:p-10 flex-1 overflow-y-auto">
            </div>
    </div>

    <script>
        // FUNGSI LOGIN
        function handleLogin() {
            const role = document.getElementById('login-role').value;
            localStorage.setItem('role', role);
            
            initDashboard(role);
        }

        // INISIALISASI DASHBOARD SETELAH LOGIN
        function initDashboard(role) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('sidebar-hide');
            document.getElementById('topbar').classList.replace('hidden', 'flex');
            document.getElementById('main-wrapper').classList.add('content-shifted');
            
            document.getElementById('display-role').innerText = role;

            // Aturan Menu Admin
            if(role === 'admin') {
                document.getElementById('menu-admin-only').classList.remove('hidden');
            } else {
                document.getElementById('menu-admin-only').classList.add('hidden');
            }

            loadContent('dashboard.html'); // Halaman pertama saat login
        }

        // FUNGSI SPA (LOAD FILE LUAR)
        async function loadContent(url) {
            const container = document.getElementById('content-container');
            const title = document.getElementById('current-page-title');
            
            title.innerText = url.replace('.html', '');
            container.innerHTML = '<p class="text-slate-400">Memuat...</p>';

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const html = await response.text();
                
                container.innerHTML = `<div class="fade-in">${html}</div>`;
                
                // Tutup sidebar otomatis di mobile setelah klik menu
                if(window.innerWidth < 1024) toggleSidebar();

            } catch (err) {
                container.innerHTML = `<div class="p-10 text-center bg-red-50 text-red-500 rounded-3xl border">File <b>${url}</b> belum tersedia.</div>`;
            }
        }

        // TOGGLE SIDEBAR
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const wrapper = document.getElementById('main-wrapper');
            
            sidebar.classList.toggle('sidebar-hide');
            if(window.innerWidth >= 1024) {
                wrapper.classList.toggle('content-shifted');
            }
        }

        // LOGOUT
        function handleLogout() {
            localStorage.clear();
            location.reload();
        }

        // Cek Sesi saat Refresh
        window.onload = () => {
            const savedRole = localStorage.getItem('role');
            if(savedRole) initDashboard(savedRole);
        };
    </script>
</body>
</html>
