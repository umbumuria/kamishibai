<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Sign-In Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <!-- Kontainer Login -->
    <div id="login-container" class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl transition-all duration-500">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-2xl mb-4 shadow-lg shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Selamat Datang</h1>
            <p class="text-gray-500 mt-2">Cukup klik tombol di bawah untuk masuk secara instan.</p>
        </div>

        <button id="btn-signin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-blue-100 transition-all active:scale-95 flex items-center justify-center gap-3 group">
            <span>Masuk Sekarang</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
        </button>

        <p class="text-center text-xs text-gray-400 mt-6 uppercase tracking-widest font-medium">Akses Cepat & Lokal</p>
    </div>

    <!-- Kontainer Dashboard (Tersembunyi secara default) -->
    <div id="dashboard-container" class="hidden glass-card w-full max-w-2xl p-8 rounded-3xl shadow-2xl transition-all duration-500">
        <div class="flex items-center justify-between mb-8 pb-6 border-b border-gray-100">
            <div>
                <h2 class="text-2xl font-bold text-gray-800">Dashboard Anda</h2>
                <p class="text-sm text-green-600 font-medium">Sesi Aktif</p>
            </div>
            <button id="btn-signout" class="text-sm text-red-500 font-semibold hover:bg-red-50 px-4 py-2 rounded-lg transition-colors">Keluar</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="p-6 bg-blue-50 rounded-2xl">
                <h3 class="font-bold text-blue-800 mb-2">ID Sesi</h3>
                <p id="display-session" class="text-xs font-mono text-blue-600 break-all bg-white p-2 rounded border border-blue-100"></p>
            </div>
            <div class="p-6 bg-green-50 rounded-2xl">
                <h3 class="font-bold text-green-800 mb-2">Metode Akses</h3>
                <p class="text-sm text-green-600">Instan (Tanpa Ketik)</p>
            </div>
        </div>

        <div class="mt-8 p-4 bg-gray-50 rounded-xl text-center">
            <p class="text-gray-600 italic">"Anda telah masuk ke sistem tanpa perlu mengetik satu karakter pun."</p>
        </div>
    </div>

    <!-- Overlay Loading -->
    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-blue-600 font-medium">Menyiapkan dashboard...</p>
        </div>
    </div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loader = document.getElementById('loader');
        const btnSignIn = document.getElementById('btn-signin');
        const btnSignOut = document.getElementById('btn-signout');
        const displaySession = document.getElementById('display-session');

        // Fungsi untuk mengelola tampilan berdasarkan status login
        function updateUI() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
            
            if (isLoggedIn) {
                loginContainer.classList.add('hidden');
                dashboardContainer.classList.remove('hidden');
                dashboardContainer.classList.add('fade-in');
                displaySession.textContent = sessionStorage.getItem('sessionId');
            } else {
                dashboardContainer.classList.add('hidden');
                loginContainer.classList.remove('hidden');
                loginContainer.classList.add('fade-in');
            }
        }

        // Event listener untuk tombol Masuk
        btnSignIn.addEventListener('click', () => {
            loader.classList.remove('hidden');
            
            // Simulasi proses delay loading 800ms
            setTimeout(() => {
                const randomId = 'USER-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('sessionId', randomId);
                
                loader.classList.add('hidden');
                updateUI();
            }, 800);
        });

        // Event listener untuk tombol Keluar
        btnSignOut.addEventListener('click', () => {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('sessionId');
            updateUI();
        });

        // Cek status saat halaman dimuat
        window.onload = updateUI;
    </script>
</body>
</html>
