<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamishibai MSM System</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
    
    <style>
        *{ box-sizing:border-box; }
        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Warna Latar Belakang Nuansa Industri/Pabrik Modern */
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 20px;
        }

        /* Garis indikator di atas kartu (Ciri khas papan Kamishibai) */
        .login-wrapper{
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .login-card{
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(15px);
            border-top: 5px solid #3b82f6; /* Aksen Biru Audit */
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            color: white;
        }

        /* Indikator Status Kamishibai (Merah/Hijau) */
        .status-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .dot.green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .logo{
            width: 85px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5));
            transition: transform 0.3s ease;
        }
        .logo:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .title{ 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
            color: #f8fafc;
            text-transform: uppercase;
        }
        .subtitle{ 
            font-size: 11px; 
            opacity: 0.8; 
            margin-bottom: 30px; 
            color: #94a3b8;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #cbd5e1;
            margin-left: 5px;
        }
        input{
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.6);
            color: white;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        button{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.3s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background: #2563eb;
        }

        .forgot-link {
            display: block; 
            margin-top: 20px; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 12px;
            transition: color 0.3s;
        }
        .forgot-link:hover { color: #3b82f6; }

        .footer{ 
            margin-top: 30px; 
            font-size: 10px; 
            opacity: 0.5; 
            letter-spacing: 0.5px;
        }

        #loading { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="status-dots">
                <div class="dot green"></div>
                <div class="dot red"></div>
                <div class="dot green"></div>
            </div>

            <img class="logo" src="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png" alt="Logo">
            
            <div class="title">AUDIT KAMISHIBAI</div>
            <div class="subtitle">MSM TERINTEGRASI</div>
            
            <div class="input-group">
                <label>User ID / Email</label>
                <input type="email" id="email" placeholder="Masukkan email anda...">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button onclick="login()">Verifikasi Log</button>
            
            <a href="lupapwd.html" class="forgot-link">Masalah akses akun?</a>
            <div id="loading" style="font-size:12px; margin-top:15px;"></div>
            
            <div class="footer">
                SISTEM KONTROL KUALITAS MSM<br>
                © 2026 Arifianto Hidayat
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyC1VaTDtWBkhhcpbjTb9Njw6JHHqNq9dBg", 
            authDomain: "rtestingbro.firebaseapp.com", 
            projectId: "rtestingbro", 
            storageBucket: "rtestingbro.firebasestorage.app", 
            messagingSenderId: "930800737947", 
            appId: "1:930800737947:web:51b4b4ab68dc068b95b03e" 
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.login = async function(){
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const loading = document.getElementById("loading");

            if(!email || !password){ alert("Input diperlukan!"); return; }
            
            try{
                loading.innerText = "MENGOTENTIKASI...";
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const userDoc = await getDoc(doc(db, "users", userCredential.user.uid));
                
                if(!userDoc.exists()){ 
                    alert("Akses Ditolak: User tidak ditemukan dalam database."); 
                    loading.innerText = "";
                    return; 
                }
                
                const role = userDoc.data().role;
                window.location.href = role === "admin" ? "dashboard-admin.html" : "dashboard-staff.html";
            } catch(e){ 
                loading.innerText = ""; 
                alert("Gagal Masuk: Periksa kembali kredensial Anda."); 
            }
        }
    </script>
</body>
</html>
