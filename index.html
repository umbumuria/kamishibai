<title>Kamishibai MSM System</title>

<style>

:root{
--sidebar-width:260px;
--primary:#3b82f6;
--bg-dark:#0f172a;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
transition:all .3s ease;
}

html,body{
margin:0;
padding:0;
background:var(--bg-dark);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
color:white;
height:100dvh;
overflow:hidden;
}

/* LOGIN */

#login-overlay{
position:fixed;
inset:0;
z-index:1000;
background:radial-gradient(circle at center,#1e293b 0%,#0f172a 100%);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.login-card{
background:rgba(30,41,59,.85);
backdrop-filter:blur(10px);
border-top:4px solid var(--primary);
border-radius:20px;
padding:25px;
text-align:center;
width:100%;
max-width:350px;
box-shadow:0 25px 50px rgba(0,0,0,.5);
border:1px solid rgba(255,255,255,.1);
}

.status-dots{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:15px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
}

.dot.green{background:#22c55e;box-shadow:0 0 10px #22c55e;}
.dot.red{background:#ef4444;box-shadow:0 0 10px #ef4444;}

.logo{
width:75px;
margin-bottom:10px;
}

.title{
font-size:19px;
font-weight:800;
letter-spacing:1px;
margin-bottom:5px;
}

.subtitle{
font-size:10px;
opacity:.7;
margin-bottom:20px;
text-transform:uppercase;
border-bottom:1px solid rgba(255,255,255,.1);
padding-bottom:10px;
}

/* SIDEBAR */

.sidebar{
position:fixed;
top:0;
left:0;
bottom:0;
width:var(--sidebar-width);
background:#1e293b;
border-right:1px solid rgba(255,255,255,.1);
display:flex;
flex-direction:column;
z-index:999;
transform:translateX(-100%);
}

.sidebar.active{transform:translateX(0)}

.sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
z-index:998;
display:none;
backdrop-filter:blur(2px);
}

.sidebar-overlay.active{display:block}

.sidebar-header{
padding:25px;
text-align:center;
border-bottom:1px solid rgba(255,255,255,.05);
}

.nav-links{
flex:1;
padding:15px;
overflow-y:auto;
}

.nav-item{
display:flex;
align-items:center;
padding:14px;
color:#cbd5e1;
border-radius:10px;
margin-bottom:8px;
font-weight:500;
font-size:14px;
cursor:pointer;
}

.nav-item:hover{
background:rgba(59,130,246,.1);
color:var(--primary);
}

.nav-item.active{
background:var(--primary);
color:white;
}

.nav-item span{
font-size:18px;
margin-right:12px;
}

/* MAIN */

.main-content{
margin-left:0;
height:100%;
display:flex;
flex-direction:column;
transition:margin-left .3s ease;
}

@media(min-width:992px){
.main-content.shifted{
margin-left:var(--sidebar-width);
}
}

header{
height:60px;
display:flex;
align-items:center;
padding:0 20px;
background:rgba(15,23,42,.8);
border-bottom:1px solid rgba(255,255,255,.1);
}

.menu-toggle{
font-size:24px;
cursor:pointer;
color:var(--primary);
margin-right:15px;
}

#main-frame{
width:100%;
height:100%;
border:none;
background:transparent;
}

.input-group{
text-align:left;
margin-bottom:15px;
}

.input-group label{
display:block;
font-size:11px;
margin-bottom:6px;
color:#cbd5e1;
font-weight:600;
margin-left:4px;
}

select,input{
width:100%;
height:50px;
padding:0 15px;
border-radius:12px;
border:1px solid rgba(255,255,255,.2);
background:rgba(15,23,42,.9);
color:white;
outline:none;
font-size:16px;
}

.btn-login{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-weight:700;
cursor:pointer;
}

.hidden{display:none!important}

.footer{
margin-top:25px;
font-size:9px;
opacity:.5;
}

</style>
</head>
