<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamishibai MSM System</title>
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
    
    <style>
        :root {
            --sidebar-width: 260px;
            --primary: #3b82f6;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.9);
        }

        *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s ease; }
        
        html, body { margin: 0; padding: 0; background: var(--bg-dark); font-family: -apple-system, sans-serif; color: white; height: 100dvh; overflow: hidden; }

        /* --- LOGIN SECTION --- */
        #login-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }

        .login-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-top: 4px solid var(--primary); border-radius: 20px;
            padding: 30px; text-align: center; width: 100%; max-width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0;
            width: var(--sidebar-width); background: #1e293b;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; z-index: 900;
            transform: translateX(-100%); /* Hide by default */
        }

        .sidebar.active { transform: translateX(0); }

        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .sidebar-logo { width: 60px; margin-bottom: 10px; }

        .nav-links { flex: 1; padding: 20px 10px; }
        .nav-item {
            display: flex; align-items: center; padding: 15px;
            color: #cbd5e1; text-decoration: none; border-radius: 12px;
            margin-bottom: 5px; font-weight: 500; font-size: 14px;
        }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.1); color: var(--primary); }
        .nav-item span { font-size: 20px; margin-right: 15px; }

        .btn-logout-sidebar {
            margin: 20px; padding: 12px; background: #ef4444; 
            border: none; border-radius: 10px; color: white; cursor: pointer;
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: 0; height: 100%; display: flex; flex-direction: column;
        }

        header {
            height: 60px; display: flex; align-items: center; padding: 0 20px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-toggle {
            font-size: 24px; cursor: pointer; color: var(--primary);
            display: block; margin-right: 15px;
        }

        /* --- DESKTOP ADAPTATION --- */
        @media (min-width: 992px) {
            .sidebar { transform: translateX(0); }
            .main-content { margin-left: var(--sidebar-width); }
            .menu-toggle { display: none; }
        }

        /* Form Elements inside login */
        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; color: #cbd5e1; margin-bottom: 5px; }
        select, input {
            width: 100%; height: 45px; background: #0f172a; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px; color: white; padding: 0 12px; outline: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img class="sidebar-logo" src="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
            <h3 style="margin: 0;">MSM LOGIN</h3>
            <p style="font-size: 10px; opacity: 0.6; margin-bottom: 25px;">SISTEM AUDIT KAMISHIBAI</p>
            
            <div class="input-group">
                <label>USER ROLE</label>
                <select id="username" onchange="togglePassword()">
                    <option value="auditor">AUDITOR</option>
                    <option value="admin">ADMIN</option>
                </select>
            </div>
            <div class="input-group hidden" id="pwd-group">
                <label>ADMIN PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="loginLokal()" style="width: 100%; height: 45px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">MASUK</button>
        </div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img class="sidebar-logo" src="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
            <div style="font-weight: 800; font-size: 14px;">MSM SYSTEM</div>
            <div id="user-display" style="font-size: 10px; color: var(--primary); margin-top: 5px; text-transform: uppercase;">Role: Guest</div>
        </div>

        <div class="nav-links">
            <a href="audit.html" class="nav-item"><span>📋</span> Input Audit</a>
            <a href="jadwal.html" id="link-jadwal" class="nav-item"><span>📅</span> Jadwal Audit</a>
            <a href="dashboard.html" class="nav-item"><span>📊</span> Analisa Data</a>
        </div>

        <button class="btn-logout-sidebar" onclick="location.reload()">LOGOUT</button>
    </nav>

    <div class="main-content">
        <header>
            <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
            <div style="font-weight: bold; font-size: 16px;">Dashboard Utama</div>
        </header>

        <main style="padding: 20px; flex: 1; display: flex; justify-content: center; align-items: center; text-align: center;">
            <div style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px dashed rgba(255,255,255,0.1); max-width: 500px;">
                <h2 style="color: var(--primary);">Selamat Datang!</h2>
                <p style="opacity: 0.7; font-size: 14px;">Silakan pilih menu di samping untuk memulai aktivitas audit atau melihat laporan hasil pemeriksaan.</p>
                
            </div>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function togglePassword() {
            const user = document.getElementById("username").value;
            const pwdGroup = document.getElementById("pwd-group");
            pwdGroup.classList.toggle("hidden", user !== "admin");
        }

        function loginLokal() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;

            if (user === "admin" && pass !== "admin123") {
                alert("Password Admin Salah!");
                return;
            }

            // Transisi: Sembunyikan Login Overlay
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('user-display').innerText = "Role: " + user;

            // Hak Akses Sidebar
            if (user === "auditor") {
                document.getElementById('link-jadwal').style.display = 'none';
            }
        }
    </script>
</body>
</html>
