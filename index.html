<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Transisi smooth untuk mobile menu */
        #sidebar { transition: transform 0.3s ease-in-out; }
        
        @media (max-width: 1024px) {
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #sidebar.show-mobile { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 bg-slate-900 text-white flex flex-col z-50 hidden-mobile lg:translate-x-0 shadow-2xl lg:shadow-none">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl uppercase tracking-tight">Kamishibai</h1>
            </div>
            <button onclick="toggleMenu()" class="lg:hidden p-2 text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <nav class="flex-1 px-4 space-y-2 overflow-y-auto">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="audit.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium transition-all">
                <i data-lucide="file-edit" class="w-5 h-5"></i> Input Hasil Audit
            </a>
            <a href="jadwal.html" id="nav-admin" class="hidden flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium transition-all">
                <i data-lucide="table-2" class="w-5 h-5"></i> Atur Jadwal
            </a>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-colors text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 px-4 lg:px-8 flex items-center justify-between sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="p-2 rounded-lg bg-slate-100 text-slate-600 lg:hidden hover:bg-slate-200 transition-colors">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 class="font-black text-sm lg:text-lg text-slate-800 uppercase tracking-tighter">Dashboard</h2>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="user-role-display" class="text-[10px] font-bold text-blue-600 uppercase tracking-widest">Auditor</p>
                    <p class="text-xs text-slate-500">Aktif</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-slate-200 border-2 border-white shadow-sm flex items-center justify-center text-slate-500">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 lg:p-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 lg:gap-6">
                <div class="bg-white p-6 lg:p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Total Jadwal</p>
                    <h3 class="text-3xl lg:text-4xl font-black text-slate-900 mt-2">12</h3>
                </div>
                <div class="bg-white p-6 lg:p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Audit Selesai</p>
                    <h3 class="text-3xl lg:text-4xl font-black text-blue-600 mt-2">5</h3>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Fungsi Toggle Menu Mobile
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            if (sidebar.classList.contains('hidden-mobile')) {
                sidebar.classList.remove('hidden-mobile');
                sidebar.classList.add('show-mobile');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('hidden-mobile');
                sidebar.classList.remove('show-mobile');
                overlay.classList.add('hidden');
            }
        }

        // Logic Auth & Role
        const role = localStorage.getItem('kamishibai_role') || 'user';
        document.getElementById('user-role-display').innerText = role;
        
        if(role === 'admin') {
            const adminMenu = document.getElementById('nav-admin');
            if(adminMenu) adminMenu.classList.remove('hidden');
        }

        window.logout = () => { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        };

        lucide.createIcons();
    </script>
</body>
</html>
