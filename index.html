<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kamishibai MSM System</title>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png">
    
    <style>
        *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            overflow: hidden; 
            background: #0f172a;
            /* Menggunakan dvh agar pas di layar HP yang ada bar navigasi browsernya */
            height: 100dvh; 
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 350px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 4px solid #3b82f6;
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-dots { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            margin-bottom: 20px; 
        }
        .dot { 
            width: 10px; 
            height: 10px; 
            border-radius: 50%; 
        }
        .dot.green { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .dot.red { background: #ef4444; box-shadow: 0 0 10px #ef4444; }

        .logo { 
            width: 80px; 
            height: auto; 
            margin-bottom: 15px; 
        }

        .title { 
            font-size: 20px; 
            font-weight: 800; 
            letter-spacing: 1px; 
            margin-bottom: 5px;
            color: #ffffff;
        }
        .subtitle { 
            font-size: 11px; 
            opacity: 0.8; 
            margin-bottom: 25px; 
            color: #94a3b8; 
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-group { text-align: left; margin-bottom: 15px; }
        .input-group label { 
            display: block; 
            font-size: 12px; 
            margin-bottom: 6px; 
            color: #cbd5e1;
            margin-left: 4px;
        }
        input {
            width: 100%;
            height: 50px; /* Lebih tinggi agar mudah di-tap di HP */
            padding: 0 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(15, 23, 42, 0.9);
            color: white;
            outline: none;
            font-size: 16px; /* Font 16px mencegah iPhone auto-zoom saat fokus */
            transition: 0.2s;
        }
        input:focus { 
            border-color: #3b82f6; 
            background: #0f172a;
        }

        button {
            width: 100%;
            height: 50px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            background: #3b82f6;
            color: white;
            font-weight: 700;
            font-size: 15px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        button:active { 
            transform: scale(0.97); 
            background: #2563eb;
        }

        .footer { 
            margin-top: 30px; 
            font-size: 10px; 
            opacity: 0.5; 
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="status-dots">
                <div class="dot green"></div>
                <div class="dot red"></div>
                <div class="dot green"></div>
            </div>

            <img class="logo" src="https://res.cloudinary.com/ddhsrvefu/image/upload/v1772248994/Gemini_Generated_Image_ilzww2ilzww2ilzw_vhl8zx.png" alt="Logo">
            
            <div class="title">AUDIT KAMISHIBAI</div>
            <div class="subtitle">MSM TERINTEGRASI</div>
            
            <div class="input-group">
                <label>USER ID</label>
                <input type="text" id="username" placeholder="Masukkan ID" autocomplete="off">
            </div>

            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button onclick="loginLokal()">Masuk Sistem</button>
            
            <div class="footer">
                SISTEM KONTROL KUALITAS MSM<br>
                © 2026 Arifianto Hidayat
            </div>
        </div>
    </div>

    <script>
        const users = [
            { user: "admin", pass: "admin123", role: "admin" },
            { user: "auditor", pass: "audit2026", role: "auditor" }
        ];

        function loginLokal() {
            const userInput = document.getElementById("username").value.trim();
            const passInput = document.getElementById("password").value;

            const foundUser = users.find(u => u.user.toLowerCase() === userInput.toLowerCase() && u.pass === passInput);

            if (foundUser) {
                if (foundUser.role === "admin") {
                    window.location.href = "dashboard-admin.html";
                } else {
                    window.location.href = "dashboard-auditor.html";
                }
            } else {
                alert("ID atau Password salah!");
            }
        }

        // Handle enter key
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') loginLokal();
        });
    </script>
</body>
</html>
