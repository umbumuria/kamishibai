<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Audit Kamishibai</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--primary); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        
        input, select, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); 
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; 
            min-height: 48px;
        }
        textarea { min-height: 80px; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); background: #f0f7ff; }
        input:read-only { background: #f1f5f9; color: #64748b; }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .photo-box { border: 2px dashed var(--border); border-radius: 10px; padding: 5px; text-align: center; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; overflow: hidden; background: #fafafa; }
        .photo-box img { width: 100%; border-radius: 5px; display: none; margin-bottom: 5px; object-fit: cover; }
        .photo-box span { font-size: 10px; color: #64748b; font-weight: bold; }

        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
        .btn-cancel { background: #64748b; margin-top: 10px; }
        
        /* --- Responsive Table --- */
        .filter-bar { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: white; padding: 15px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 15px; }
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 950px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; color: #64748b; border-bottom: 2px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
        
        .thumb-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 2px; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 9px; font-weight: bold; display: inline-block; }
        .badge-selesai { background: #e0e7ff; color: #3730a3; }
        .badge-closed { background: #dcfce7; color: #166534; }
        .badge-open { background: #fee2e2; color: #991b1b; }

        .btn-edit { background: #f59e0b; color: white; padding: 5px 10px; border-radius: 6px; border: none; font-size: 10px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: var(--danger); color: white; padding: 5px 10px; border-radius: 6px; border: none; font-size: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }

        @media (max-width: 600px) {
            .grid, .filter-bar { grid-template-columns: 1fr; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container" id="editFormContainer">
    <div class="section-title">MODE EDIT DATA AUDIT</div>
    
    <form id="auditForm">
        <input type="hidden" id="editDocId">

        <div class="grid">
            <div><label>Group</label><input type="text" id="displayGroup" readonly></div>
            <div><label>Auditor</label><input type="text" id="displayAuditor" readonly></div>
            <div><label>Dept. Auditee</label><input type="text" id="displayDept" readonly></div>
            <div><label>Tanggal Audit</label><input type="date" id="tglAudit" required></div>
            <div><label>Nama Personel Auditee</label><input type="text" id="namaAuditee" required></div>
            <div><label>Judul IK / Materi</label><input type="text" id="judulIK" required></div>
            <div><label>Jumlah Item Cek</label><input type="number" id="jmlItem" oninput="hitungNilai()" required></div>
            <div><label>Jumlah Temuan</label><input type="number" id="jmlTemuan" oninput="hitungNilai()" required></div>
            <div><label>Nilai Pencapaian (%)</label><input type="text" id="nilaiTemuan" readonly></div>
            <div>
                <label>Status Akhir</label>
                <select id="statusVerifikasi">
                    <option value="OPEN">OPEN (Perlu Perbaikan)</option>
                    <option value="CLOSED">CLOSED (Sudah Sesuai)</option>
                    <option value="OBSERVASI">OBSERVASI</option>
                </select>
            </div>
        </div>

        <label>Uraian Ketidaksesuaian</label>
        <textarea id="uraian" rows="2"></textarea>

        <div class="grid">
            <div><label>Analisa Penyebab</label><textarea id="penyebab" rows="2"></textarea></div>
            <div><label>Tindakan Perbaikan</label><textarea id="tindakan" rows="2"></textarea></div>
        </div>

        <label>Foto Bukti</label>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    let labelFoto = (i === 5) ? "FOTO BERSAMA AUDITEE" : `FOTO ${i}`;
                    document.write(`
                        <div class="photo-box" onclick="document.getElementById('file${i}').click()">
                            <img id="img${i}" src="">
                            <span id="text${i}">${labelFoto}</span>
                            <div id="load${i}" style="display:none; font-size:10px; color:var(--primary);">Uploading...</div>
                            <input type="file" id="file${i}" accept="image/*" hidden onchange="uploadImage(this, ${i})">
                            <input type="hidden" id="url${i}">
                        </div>
                    `);
                }
            </script>
        </div>

        <label>Catatan Tambahan</label>
        <input type="text" id="updateCatatan" placeholder="Tambahkan catatan jika diperlukan...">

        <button type="submit" id="btnSave" class="btn-submit">UPDATE DATA AUDIT</button>
        <button type="button" onclick="resetForm()" class="btn-submit btn-cancel">BATAL / RESET</button>
    </form>
</div>

<div style="max-width: 1150px; margin: 0 auto; margin-bottom: 80px; padding:0 15px;">
    <div class="section-title">HISTORY & MANAJEMEN DATA</div>
    
    <div class="filter-bar">
        <input type="text" id="fAuditor" placeholder="Cari Auditor..." oninput="fetchAuditHistory()">
        <select id="fGroup" onchange="fetchAuditHistory()">
            <option value="">Semua Group</option>
            <option value="SF">SF</option><option value="SP">SP</option><option value="SUPPORTING">SUPPORTING</option>
        </select>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>TGL AUDIT</th>
                    <th>GROUP / UNIT</th>
                    <th>AUDITOR</th>
                    <th>MATERI & TEMUAN</th>
                    <th>NILAI</th>
                    <th>FOTO</th>
                    <th>CATATAN</th> <th>STATUS</th>
                    <th>AKSI</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
        authDomain: "kamishibaimsm.firebaseapp.com",
        projectId: "kamishibaimsm",
        storageBucket: "kamishibaimsm.firebasestorage.app",
        messagingSenderId: "184420389379",
        appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/ddhsrvefu/image/upload";
    const CLOUDINARY_PRESET = "kamishiba_foto";

    function hitungNilai() {
        const i = parseFloat(document.getElementById('jmlItem').value) || 0;
        const t = parseFloat(document.getElementById('jmlTemuan').value) || 0;
        document.getElementById('nilaiTemuan').value = i > 0 ? ((1-(t/i))*100).toFixed(2) + "%" : "0%";
    }

    async function uploadImage(input, idx) {
        const file = input.files[0];
        if(!file) return;
        document.getElementById(`load${idx}`).style.display = 'block';
        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_PRESET);
        try {
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById(`url${idx}`).value = data.secure_url;
            document.getElementById(`img${idx}`).src = data.secure_url;
            document.getElementById(`img${idx}`).style.display = 'block';
            document.getElementById(`text${idx}`).style.display = 'none';
        } catch (e) { alert("Upload gagal!"); }
        document.getElementById(`load${idx}`).style.display = 'none';
    }

    async function fetchAuditHistory() {
        const fAud = document.getElementById('fAuditor').value.toLowerCase();
        const fGrp = document.getElementById('fGroup').value;
        const body = document.getElementById('historyBody');
        try {
            const snap = await db.collection('jadwal_audit')
                .where('status', '==', 'Selesai')
                .orderBy('updatedAt', 'desc')
                .limit(30)
                .get();
            body.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                if(d.auditor.toLowerCase().includes(fAud) && (fGrp === "" || d.group === fGrp)) {
                    let fotoHtml = '';
                    if(d.foto) d.foto.forEach(url => { fotoHtml += `<img src="${url}" class="thumb-img" onclick="window.open('${url}')">`; });
                    
                    body.innerHTML += `
                        <tr>
                            <td>${d.tglAudit}</td>
                            <td><b>${d.group}</b><br>${d.auditee}</td>
                            <td>${d.auditor}</td>
                            <td><small>${d.judulIK || '-'}</small><br><i style="color:#64748b">${d.uraian || '-'}</i></td>
                            <td style="font-weight:bold">${d.nilaiPencapaian}</td>
                            <td><div style="display:flex">${fotoHtml || '-'}</div></td>
                            <td style="color:#2563eb; font-size:10px;">${d.updateCatatan || '-'}</td> <td><span class="badge ${d.statusVerifikasi==='CLOSED'?'badge-closed':'badge-open'}">${d.statusVerifikasi}</span></td>
                            <td>
                                <button class="btn-edit" onclick='prepareEdit("${doc.id}", ${JSON.stringify(d).replace(/'/g, "&apos;")})'>EDIT</button>
                                <button class="btn-delete" onclick='deleteAudit("${doc.id}")'>HAPUS</button>
                            </td>
                        </tr>
                    `;
                }
            });
        } catch (e) { console.error(e); }
    }

    function prepareEdit(id, data) {
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('editDocId').value = id;
        document.getElementById('displayGroup').value = data.group || '';
        document.getElementById('displayAuditor').value = data.auditor || '';
        document.getElementById('displayDept').value = data.auditee || '';
        document.getElementById('tglAudit').value = data.tglAudit || '';
        document.getElementById('namaAuditee').value = data.namaAuditeePerson || '';
        document.getElementById('judulIK').value = data.judulIK || '';
        document.getElementById('jmlItem').value = data.jmlItem || 10;
        document.getElementById('jmlTemuan').value = data.jmlTemuan || 0;
        document.getElementById('nilaiTemuan').value = data.nilaiPencapaian || '100%';
        document.getElementById('statusVerifikasi').value = data.statusVerifikasi || 'OPEN';
        document.getElementById('uraian').value = data.uraian || '';
        document.getElementById('penyebab').value = data.penyebab || '';
        document.getElementById('tindakan').value = data.tindakan || '';
        document.getElementById('updateCatatan').value = data.updateCatatan || ''; // Menarik catatan ke input

        for(let i=1; i<=5; i++) {
            const img = document.getElementById(`img${i}`);
            const urlInput = document.getElementById(`url${i}`);
            const span = document.getElementById(`text${i}`);
            if(data.foto && data.foto[i-1]) {
                img.src = data.foto[i-1]; img.style.display = 'block';
                urlInput.value = data.foto[i-1]; span.style.display = 'none';
            } else {
                img.src = ''; img.style.display = 'none';
                urlInput.value = ''; span.style.display = 'block';
            }
        }
        document.getElementById('btnSave').innerText = "SIMPAN PERUBAHAN";
    }

    document.getElementById('auditForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('editDocId').value;
        if(!id) return alert("Pilih data dari tabel di bawah dahulu!");
        
        const btn = document.getElementById('btnSave');
        btn.disabled = true; btn.innerText = "Memproses...";
        
        const updateData = {
            tglAudit: document.getElementById('tglAudit').value,
            namaAuditeePerson: document.getElementById('namaAuditee').value,
            judulIK: document.getElementById('judulIK').value,
            jmlItem: document.getElementById('jmlItem').value,
            jmlTemuan: document.getElementById('jmlTemuan').value,
            nilaiPencapaian: document.getElementById('nilaiTemuan').value,
            uraian: document.getElementById('uraian').value,
            penyebab: document.getElementById('penyebab').value,
            tindakan: document.getElementById('tindakan').value,
            statusVerifikasi: document.getElementById('statusVerifikasi').value,
            updateCatatan: document.getElementById('updateCatatan').value, // Mengirim catatan baru
            foto: [1,2,3,4,5].map(i => document.getElementById(`url${i}`).value).filter(v => v),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection('jadwal_audit').doc(id).update(updateData);
            alert("Data Berhasil Diperbarui!");
            location.reload();
        } catch (e) { alert("Gagal update!"); btn.disabled = false; }
    };

    async function deleteAudit(id) {
        if(!confirm("Yakin ingin menghapus hasil audit ini? Data akan kembali ke status 'Pending'.")) return;
        try {
            await db.collection('jadwal_audit').doc(id).update({
                status: "Pending",
                tglAudit: "",
                uraian: "",
                foto: [],
                updateCatatan: ""
            });
            alert("Hasil audit dihapus & dikembalikan ke jadwal pending.");
            fetchAuditHistory();
        } catch (e) { alert("Gagal menghapus!"); }
    }

    function resetForm() { location.reload(); }
    fetchAuditHistory();
</script>
</body>
</html>
