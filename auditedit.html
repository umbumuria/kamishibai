<table id="historyTable">
    <thead>
        <tr>
            <th>Aksi</th>
            <th>Info Dasar</th>
            <th>Auditor / Auditee</th>
            <th>Materi & Temuan</th>
            <th>Analisa & Tindakan</th>
            <th>Data Angka</th>
            <th>Foto Bukti</th>
            <th>Status & Catatan</th>
        </tr>
    </thead>
    <tbody id="historyBody"></tbody>
</table>

<script>
    // ... (Script Firebase, uploadImage, editAudit tetap sama) ...

    async function fetchAuditHistory() {
        // Mengambil data dari Firestore
        const snap = await db.collection('jadwal_audit')
                           .where('status', '==', 'Selesai')
                           .orderBy('updatedAt', 'desc')
                           .get();
        
        const body = document.getElementById('historyBody');
        body.innerHTML = '';

        snap.forEach(doc => {
            const d = doc.data(); 
            cacheHistory[doc.id] = d;

            // Render Foto
            let fotoHtml = (d.foto || []).map(url => 
                `<img src="${url}" class="thumb-img" onclick="window.open('${url}')" title="Klik untuk perbesar">`
            ).join('');

            // Baris Data Baru dengan Semua Field
            body.innerHTML += `
                <tr>
                    <td>
                        <button class="action-btn btn-edit" onclick="editAudit('${doc.id}')">EDIT</button>
                        <button class="action-btn btn-delete" onclick="deleteAudit('${doc.id}')">HAPUS</button>
                    </td>
                    <td>
                        <b>Tgl:</b> ${d.tglAudit}<br>
                        <b>Group:</b> ${d.group}<br>
                        <b>Dept:</b> ${d.auditee}
                    </td>
                    <td>
                        <b>Auditor:</b> ${d.auditor}<br>
                        <b>Personel:</b> ${d.namaAuditeePerson || '-'}
                    </td>
                    <td>
                        <div style="max-width:200px">
                            <b>IK:</b> ${d.judulIK}<br>
                            <span style="color: #ef4444"><b>Temuan (${d.statusTemuan}):</b></span><br>
                            <i>${d.uraian || '-'}</i><br>
                            <small><b>Kategori:</b> ${d.kategoriTemuan || '-'}</small>
                        </div>
                    </td>
                    <td>
                        <div style="max-width:200px">
                            <b>Penyebab:</b><br>${d.penyebab || '-'}<br>
                            <b>Tindakan:</b><br>${d.tindakan || '-'}
                        </div>
                    </td>
                    <td>
                        Item: ${d.jmlItem}<br>
                        Temuan: ${d.jmlTemuan}<br>
                        <b>Nilai: ${d.nilaiPencapaian}</b>
                    </td>
                    <td>
                        <div style="display: flex; flex-wrap: wrap; gap: 4px; width: 110px;">
                            ${fotoHtml || '<small style="color:#94a3b8">Tanpa Foto</small>'}
                        </div>
                    </td>
                    <td>
                        <span class="badge ${d.statusVerifikasi === 'CLOSED' ? 'badge-closed' : 'badge-open'}">
                            ${d.statusVerifikasi}
                        </span>
                        <div style="margin-top:5px; font-size:10px; color:#64748b">
                            <b>Catatan:</b><br>${d.updateCatatan || '-'}
                        </div>
                    </td>
                </tr>`;
        });
    }
    // Panggil fungsi saat load
    fetchAuditHistory();
</script>
