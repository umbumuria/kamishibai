<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    <aside class="w-72 bg-slate-900 text-white flex flex-col z-50">
        <div class="p-8 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
            <h1 class="font-bold text-xl uppercase">Kamishibai</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="audit.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">
                <i data-lucide="file-edit" class="w-5 h-5"></i> Input Hasil Audit
            </a>
            <a href="jadwal.html" id="nav-admin" class="hidden flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
                <i data-lucide="table-2" class="w-5 h-5"></i> Atur Jadwal
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-400 text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
            <h2 class="font-black text-lg text-slate-800 uppercase">INPUT HASIL AUDIT</h2>
        </header>
        <div class="p-8 flex-1 overflow-y-auto">
            <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm max-w-4xl mx-auto">
                <div class="mb-8 text-center">
                    <h3 class="text-xl font-bold text-slate-800">Cari Jadwal Audit</h3>
                    <p class="text-sm text-slate-400">Pilih jadwal Anda untuk menginput hasil</p>
                </div>
                <div class="relative mb-6">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input type="text" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500" placeholder="Cari nama auditor atau departemen...">
                </div>
                <div class="space-y-3">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                        <div>
                            <span class="text-[9px] font-black px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md uppercase">GROUP A</span>
                            <h4 class="font-bold text-slate-800">Production Dept.</h4>
                            <p class="text-xs text-slate-500">Auditor: John Doe</p>
                        </div>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Pilih</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        if(localStorage.getItem('kamishibai_role') === 'admin') document.getElementById('nav-admin').classList.remove('hidden');
        window.logout = () => { localStorage.clear(); window.location.href = 'index.html'; };
        lucide.createIcons();
    </script>
</body>
</html>
