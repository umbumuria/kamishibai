<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Import & Sync Data Documents</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --bg: transparent; --danger: #ef4444; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            color: white; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .import-card { 
            background: #1e293b; 
            width: 100%;
            max-width: 650px; 
            padding: 30px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        h2 { color: var(--primary); margin-top: 0; font-size: 22px; text-align: center; }
        .desc { font-size: 13px; opacity: 0.7; text-align: center; margin-bottom: 25px; }

        .template-area { text-align: center; margin-bottom: 20px; }
        .btn-template {
            background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid #10b981;
            padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-template:hover { background: rgba(16, 185, 129, 0.2); }

        .file-input { 
            border: 2px dashed rgba(255,255,255,0.2); padding: 40px 20px; 
            text-align: center; border-radius: 15px; margin: 10px 0 20px 0; 
            cursor: pointer; background: rgba(15, 23, 42, 0.5); transition: 0.3s;
        }
        .file-input:hover { border-color: var(--primary); background: rgba(59, 130, 246, 0.05); }

        .btn-upload { 
            background: var(--primary); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }
        .btn-upload:disabled { background: #475569; cursor: not-allowed; box-shadow: none; }

        #statusLog { 
            margin-top: 25px; background: #0f172a; color: #38bdf8; 
            padding: 15px; border-radius: 12px; height: 150px; 
            overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px;
            border: 1px solid rgba(255,255,255,0.05); line-height: 1.6;
        }

        /* --- TABLE STYLE --- */
        .table-container {
            width: 100%; max-width: 900px; background: #1e293b; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        th { background: rgba(15, 23, 42, 0.8); padding: 12px; color: var(--primary); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger);
            padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 10px;
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        .success-text { color: #4ade80; font-weight: bold; }
        .error-text { color: #f87171; }
        .info-text { color: #eab308; }

        /* Pagination Style */
        .pagination-bar {
            padding: 10px 15px; background: rgba(15, 23, 42, 0.5); 
            display: flex; justify-content: center; gap: 10px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .btn-nav {
            background: #334155; color: white; border: none; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; font-size: 12px;
        }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .search-box {
            padding: 10px 15px; background: rgba(15, 23, 42, 0.5); border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 12px; border-radius: 8px; color: white; font-size: 13px; outline: none; box-sizing: border-box;
        }
        .search-box input:focus { border-color: var(--primary); }
    </style>
</head>
<body>

<div class="import-card">
    <h2>Sync Data Materi Audit</h2>
    <p class="desc">Import dokumen (SOP/IK/FORM) ke dalam database sistem.</p>

    <div class="template-area">
        <button class="btn-template" onclick="downloadTemplate()">
            <span>📥</span> Download Template Materi (.xlsx)
        </button>
    </div>

    <div class="file-input" onclick="document.getElementById('excelFile').click()">
        <span id="fileName" style="font-size: 15px;">📁 Pilih File Excel Materi</span>
        <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" style="display:none" onchange="updateFileName()">
    </div>

    <button class="btn-upload" id="btnProses" onclick="prosesFile()">Mulai Sinkronisasi Materi</button>

    <div id="statusLog">Menunggu file untuk diproses...</div>
</div>

<div class="table-container">
    <div style="padding: 15px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between;">
        <span>List Dokumen Terdaftar</span>
        <span id="docCount" style="color: var(--primary);">Loading...</span>
    </div>
    
    <div class="search-box">
        <input type="text" id="filterInput" placeholder="Cari berdasarkan Nomor Dokumen (Eksak)..." onchange="loadData('search')">
    </div>

    <div style="overflow-x: auto;">
        <table id="docTable">
            <thead>
                <tr>
                    <th>Group</th>
                    <th>Auditee</th>
                    <th>Judul IK</th>
                    <th>Nomor Dokumen</th>
                    <th>Rev</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="documentTableBody">
                <tr><td colspan="7" style="text-align:center; padding: 20px; opacity: 0.5;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination-bar">
        <button class="btn-nav" id="btnPrev" onclick="loadData('prev')" disabled>Sebelumnya</button>
        <button class="btn-nav" id="btnNext" onclick="loadData('next')" disabled>Berikutnya</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
        authDomain: "kamishibaimsm.firebaseapp.com",
        projectId: "kamishibaimsm",
        storageBucket: "kamishibaimsm.firebasestorage.app",
        messagingSenderId: "184420389379",
        appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- PAGINATION SETTINGS ---
    const PAGE_SIZE = 10;
    let firstDoc = null;
    let lastDoc = null;

    // Load initial data
    window.onload = () => loadData('init');

    async function loadData(direction = 'init') {
        const tbody = document.getElementById('documentTableBody');
        const filterValue = document.getElementById('filterInput').value.trim();
        let query = db.collection('documents');

        // Reset if searching
        if (direction === 'search') {
            firstDoc = null;
            lastDoc = null;
        }

        // Apply filtering (Firestore limited to exact match or prefix for optimization)
        if (filterValue) {
            query = query.where('nomor_dokumen', '>=', filterValue)
                         .where('nomor_dokumen', '<=', filterValue + '\uf8ff');
        }

        query = query.orderBy('nomor_dokumen', 'asc');

        if (direction === 'next' && lastDoc) {
            query = query.startAfter(lastDoc).limit(PAGE_SIZE);
        } else if (direction === 'prev' && firstDoc) {
            query = query.endBefore(firstDoc).limitToLast(PAGE_SIZE);
        } else {
            query = query.limit(PAGE_SIZE);
        }

        try {
            const snapshot = await query.get();
            renderTable(snapshot);
            updatePaginationButtons(snapshot, direction, !!filterValue);
            updateTotalCount();
        } catch (error) {
            console.error("Error loading data: ", error);
        }
    }

    function renderTable(snapshot) {
        const tbody = document.getElementById('documentTableBody');
        tbody.innerHTML = '';

        if (snapshot.empty) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding: 20px; opacity: 0.5;">Tidak ada data ditemukan.</td></tr>';
            return;
        }

        firstDoc = snapshot.docs[0];
        lastDoc = snapshot.docs[snapshot.docs.length - 1];

        snapshot.forEach(doc => {
            const data = doc.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${data.group || '-'}</td>
                <td>${data.auditee || '-'}</td>
                <td>${data.judulIK || '-'}</td>
                <td style="font-family: monospace;">${data.nomor_dokumen || '-'}</td>
                <td>${data.rev_ke || '0'}</td>
                <td><span style="color: ${data.status === 'Aktif' ? '#4ade80' : '#f87171'}">${data.status || 'Aktif'}</span></td>
                <td><button class="btn-delete" onclick="deleteDoc('${doc.id}')">Hapus</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updatePaginationButtons(snapshot, direction, isFiltered) {
        const btnNext = document.getElementById('btnNext');
        const btnPrev = document.getElementById('btnPrev');

        // Sederhana: Aktifkan next jika jumlah data sesuai limit
        btnNext.disabled = snapshot.size < PAGE_SIZE;
        
        // Logika sederhana untuk tombol prev
        if (direction === 'init' || direction === 'search') {
            btnPrev.disabled = true;
        } else if (direction === 'next') {
            btnPrev.disabled = false;
        } else if (direction === 'prev' && snapshot.size < PAGE_SIZE) {
            // Jika di halaman pertama setelah balik
            btnPrev.disabled = true;
        }
    }

    async function updateTotalCount() {
        // Menggunakan count() aggregation (hemat kuota: 1 read per 1000 index entries)
        const snapshot = await db.collection('documents').count().get();
        document.getElementById('docCount').innerText = `${snapshot.data().count} Dokumen`;
    }

    async function deleteDoc(id) {
        if (confirm('Hapus dokumen ini?')) {
            try {
                await db.collection('documents').doc(id).delete();
                loadData('init'); // Refresh page
            } catch (err) {
                alert('Gagal menghapus: ' + err.message);
            }
        }
    }

    function downloadTemplate() {
        const headers = [["group", "auditee", "jenis dokumen", "judulIK", "nomor dokumen", "rev ke", "tanggal revisi", "status dokumen", "status"]];
        const ws = XLSX.utils.aoa_to_sheet(headers);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Documents");
        XLSX.writeFile(wb, "template_materi_audit.xlsx");
    }

    function updateFileName() {
        const input = document.getElementById('excelFile');
        if(input.files[0]) {
            document.getElementById('fileName').innerHTML = `<b style="color:#3b82f6">Terpilih:</b> ${input.files[0].name}`;
        }
    }

    async function prosesFile() {
        const fileInput = document.getElementById('excelFile');
        const log = document.getElementById('statusLog');
        const btn = document.getElementById('btnProses');

        if (!fileInput.files[0]) { alert("Silakan pilih file terlebih dahulu."); return; }

        btn.disabled = true;
        log.innerHTML = "<span class='info-text'>[SISTEM] Membaca file materi...</span><br>";

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);

            log.innerHTML += `<span class='info-text'>[SISTEM] Ditemukan ${json.length} dokumen.</span><br>---<br>`;

            for (let i = 0; i < json.length; i++) {
                const item = json[i];
                let tglRevFinal = String(item['tanggal revisi'] || "").trim();
                if (item['tanggal revisi'] instanceof Date) {
                    tglRevFinal = item['tanggal revisi'].toISOString().split('T')[0];
                }

                const docId = String(item['nomor dokumen'] || `DOC-${Date.now()}-${i}`).replace(/[/\\?%*:|"<>]/g, '-').trim();

                try {
                    await db.collection('documents').doc(docId).set({
                        group: String(item.group || "").trim(),
                        auditee: String(item.auditee || "").trim(),
                        jenis_dokumen: String(item['jenis dokumen'] || "").trim(),
                        judulIK: String(item.judulIK || "").trim(),
                        nomor_dokumen: String(item['nomor dokumen'] || "").trim(),
                        rev_ke: String(item['rev ke'] || "00").trim(),
                        tanggal_revisi: tglRevFinal,
                        status_dokumen: String(item['status dokumen'] || "").trim(),
                        status: String(item.status || "Aktif").trim(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                    log.innerHTML += `<span class="success-text">[OK] ${docId} BERHASIL</span><br>`;
                } catch (err) {
                    log.innerHTML += `<span class="error-text">[ERROR] ${docId}: ${err.message}</span><br>`;
                }
                log.scrollTop = log.scrollHeight;
            }
            log.innerHTML += "<br>--- SELESAI ---";
            btn.disabled = false;
            loadData('init');
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }
</script>
</body>
</html>
