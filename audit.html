<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Audit Kamishibai</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .section-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--primary); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full { grid-column: span 2; }
        
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:read-only { background: #f1f5f9; color: #64748b; }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .photo-box { border: 2px dashed var(--border); border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; position: relative; min-height: 100px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .photo-box img { width: 100%; border-radius: 5px; display: none; margin-bottom: 5px; }
        .photo-box span { font-size: 10px; color: #64748b; }
        .loading-spin { font-size: 10px; color: var(--primary); display: none; }

        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">LAPORAN HASIL AUDIT KAMISHIBAI</div>
    
    <form id="auditForm">
        <label>Pilih Jadwal Audit (Referensi Database)</label>
        <select id="selectJadwal" onchange="fillJadwalData(this.value)" required>
            <option value="">-- Memuat Jadwal Pending... --</option>
        </select>

        <div class="grid">
            <div>
                <label>Group</label>
                <input type="text" id="displayGroup" readonly>
            </div>
            <div>
                <label>Tanggal Audit</label>
                <input type="date" id="tglAudit" required>
            </div>
            <div>
                <label>Nama Auditor</label>
                <input type="text" id="displayAuditor" readonly>
            </div>
            <div>
                <label>Dept. Auditee</label>
                <input type="text" id="displayDept" readonly>
            </div>
            <div>
                <label>Nama Personel Auditee</label>
                <input type="text" id="namaAuditee" placeholder="Nama orang yang diaudit..." required>
            </div>
            <div>
                <label>Judul IK / Materi</label>
                <input type="text" id="judulIK" placeholder="Contoh: IK Pengoperasian Mesin..." required>
            </div>
            <div>
                <label>Jumlah Item Audit</label>
                <input type="number" id="jmlItem" value="10" oninput="hitungNilai()" required>
            </div>
            <div>
                <label>Jumlah Temuan</label>
                <input type="number" id="jmlTemuan" value="0" oninput="hitungNilai()" required>
            </div>
            <div>
                <label>Nilai Pencapaian (%)</label>
                <input type="text" id="nilaiTemuan" readonly>
            </div>
            <div>
                <label>Status Verifikasi</label>
                <select id="statusVerifikasi">
                    <option value="OPEN">OPEN</option>
                    <option value="CLOSED">CLOSED</option>
                    <option value="OBSERVASI">OBSERVASI</option>
                </select>
            </div>
        </div>

        <label>Uraian Ketidaksesuaian</label>
        <textarea id="uraian" rows="2" placeholder="Detail temuan..."></textarea>

        <label>Penyebab & Tindakan Perbaikan</label>
        <div class="grid">
            <textarea id="penyebab" rows="2" placeholder="Penyebab..."></textarea>
            <textarea id="tindakan" rows="2" placeholder="Tindakan perbaikan..."></textarea>
        </div>

        <label>Dokumentasi Foto Temuan (Maks 5 Foto)</label>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`
                        <div class="photo-box" onclick="document.getElementById('file${i}').click()">
                            <img id="img${i}" src="">
                            <span id="text${i}">Foto ${i}</span>
                            <div id="load${i}" class="loading-spin">Uploading...</div>
                            <input type="file" id="file${i}" accept="image/*" hidden onchange="uploadImage(this, ${i})">
                            <input type="hidden" id="url${i}">
                        </div>
                    `);
                }
            </script>
        </div>

        <label>Update / Catatan Tambahan</label>
        <input type="text" id="updateCatatan" placeholder="...">

        <button type="submit" id="btnSave" class="btn-submit">SIMPAN HASIL AUDIT</button>
    </form>
</div>

<script>
    // --- KONFIGURASI ---
    const firebaseConfig = {
        apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
        authDomain: "kamishibaimsm.firebaseapp.com",
        projectId: "kamishibaimsm",
        storageBucket: "kamishibaimsm.firebasestorage.app",
        messagingSenderId: "184420389379",
        appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/your_cloud_name/image/upload";
    const CLOUDINARY_PRESET = "your_preset_name";

    let jadwalCache = {};

    // Load Jadwal
    async function loadJadwal() {
        const snap = await db.collection('jadwal_audit').where('status', '==', 'Pending').get();
        const select = document.getElementById('selectJadwal');
        select.innerHTML = '<option value="">-- Pilih Jadwal --</option>';
        snap.forEach(doc => {
            jadwalCache[doc.id] = doc.data();
            const d = doc.data();
            select.innerHTML += `<option value="${doc.id}">${d.periode} | ${d.auditor} - ${d.auditee}</option>`;
        });
    }

    function fillJadwalData(id) {
        if(!id) return;
        const d = jadwalCache[id];
        document.getElementById('displayGroup').value = d.group;
        document.getElementById('displayAuditor').value = d.auditor;
        document.getElementById('displayDept').value = d.auditee;
        hitungNilai();
    }

    function hitungNilai() {
        const item = parseFloat(document.getElementById('jmlItem').value) || 0;
        const temuan = parseFloat(document.getElementById('jmlTemuan').value) || 0;
        if(item > 0) {
            const hasil = (1 - (temuan / item)) * 100;
            document.getElementById('nilaiTemuan').value = hasil.toFixed(2) + "%";
        }
    }

    async function uploadImage(input, index) {
        const file = input.files[0];
        if(!file) return;

        document.getElementById(`load${index}`).style.display = 'block';
        document.getElementById(`text${index}`).style.display = 'none';

        const fd = new FormData();
        fd.append('file', file);
        fd.append('upload_preset', CLOUDINARY_PRESET);

        try {
            const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById(`url${index}`).value = data.secure_url;
            const img = document.getElementById(`img${index}`);
            img.src = data.secure_url;
            img.style.display = 'block';
        } catch (e) {
            alert("Upload Gagal");
        } finally {
            document.getElementById(`load${index}`).style.display = 'none';
        }
    }

    document.getElementById('auditForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('selectJadwal').value;
        if(!id) return alert("Pilih jadwal!");

        const btn = document.getElementById('btnSave');
        btn.disabled = true;
        btn.innerText = "Menyimpan...";

        const dataAudit = {
            tglAudit: document.getElementById('tglAudit').value,
            namaAuditeePerson: document.getElementById('namaAuditee').value,
            judulIK: document.getElementById('judulIK').value,
            jmlItem: document.getElementById('jmlItem').value,
            jmlTemuan: document.getElementById('jmlTemuan').value,
            nilaiPencapaian: document.getElementById('nilaiTemuan').value,
            uraian: document.getElementById('uraian').value,
            penyebab: document.getElementById('penyebab').value,
            tindakan: document.getElementById('tindakan').value,
            statusVerifikasi: document.getElementById('statusVerifikasi').value,
            updateCatatan: document.getElementById('updateCatatan').value,
            status: "Selesai",
            foto: [
                document.getElementById('url1').value,
                document.getElementById('url2').value,
                document.getElementById('url3').value,
                document.getElementById('url4').value,
                document.getElementById('url5').value
            ].filter(url => url !== ""),
            auditSubmittedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection('jadwal_audit').doc(id).update(dataAudit);
            alert("Audit Berhasil Disimpan!");
            location.reload();
        } catch (err) {
            alert("Gagal: " + err.message);
            btn.disabled = false;
        }
    };

    loadJadwal();
</script>
</body>
</html>
