<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Audit Kamishibai</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--primary); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        input:read-only { background: #f1f5f9; color: #64748b; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .photo-box { border: 2px dashed var(--border); border-radius: 10px; text-align: center; cursor: pointer; min-height: 100px; display: flex; align-items: center; justify-content: center; background: #fafafa; overflow: hidden; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 800px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .thumb-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; margin-right: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section-title">FORM INPUT HASIL AUDIT</div>
    <form id="auditForm">
        <label>1. Pilih Group</label>
        <select id="filterGroupJadwal" onchange="loadJadwal()">
            <option value="">-- Pilih Group --</option>
            <option value="SF">SUGAR FACTORY</option>
            <option value="SP">PLANTATION</option>
            <option value="SUPPORTING">SUPPORTING</option>
        </select>

        <label>2. Pilih Jadwal Audit (Status Pending)</label>
        <select id="selectJadwal" onchange="fillJadwalData(this.value)" required>
            <option value="">-- Pilih Jadwal --</option>
        </select>

        <div class="grid">
            <div><label>Tanggal Audit</label><input type="date" id="tglAudit" required></div>
            <div><label>Auditor</label><input type="text" id="displayAuditor" readonly></div>
            <div><label>Dept. Auditee</label><input type="text" id="displayDept" readonly></div>
            <div><label>Judul IK / Materi</label><input type="text" id="judulIK" readonly style="background:#fff9db; font-weight:bold;"></div>
            <div><label>Nama Personel Auditee</label><input type="text" id="namaAuditee" required></div>
            <div><label>Nilai Pencapaian (%)</label><input type="text" id="nilaiTemuan" readonly></div>
        </div>

        <div class="grid" style="grid-template-columns: 1fr 1fr;">
            <div><label>Jumlah Item Cek</label><input type="number" id="jmlItem" value="10" oninput="hitungNilai()"></div>
            <div><label>Jumlah Temuan</label><input type="number" id="jmlTemuan" value="0" oninput="hitungNilai()"></div>
        </div>

        <label>Status Verifikasi</label>
        <select id="statusVerifikasi">
            <option value="CLOSED">CLOSED (Sesuai)</option>
            <option value="OPEN">OPEN (Temuan)</option>
        </select>

        <label>Uraian Temuan & Tindakan</label>
        <textarea id="uraian" placeholder="Uraian ketidaksesuaian..."></textarea>
        <textarea id="tindakan" placeholder="Tindakan perbaikan..."></textarea>

        <label>Foto Bukti (Maks 5)</label>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=5; i++) {
                    document.write(`
                        <div class="photo-box" onclick="document.getElementById('file${i}').click()">
                            <img id="img${i}" style="display:none">
                            <span id="txt${i}">FOTO ${i}</span>
                            <input type="file" id="file${i}" hidden onchange="uploadImage(this, ${i})">
                            <input type="hidden" id="url${i}">
                        </div>
                    `);
                }
            </script>
        </div>

        <button type="submit" id="btnSave" class="btn-submit">SIMPAN HASIL AUDIT</button>
    </form>
</div>

<div class="container" style="max-width: 1000px;">
    <div class="section-title">HISTORY AUDIT SELESAI</div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Tgl</th>
                    <th>Dept</th>
                    <th>Auditor</th>
                    <th>Materi</th>
                    <th>Nilai</th>
                    <th>Foto</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="historyBody"></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCiW38hQ5ZfYnp3sa95OQw6IjxnfnM5dl4",
        authDomain: "kamishibaimsm.firebaseapp.com",
        projectId: "kamishibaimsm",
        storageBucket: "kamishibaimsm.firebasestorage.app",
        messagingSenderId: "184420389379",
        appId: "1:184420389379:web:51bbb78ce5fa8e8d227436"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/ddhsrvefu/image/upload";
    const CLOUDINARY_PRESET = "kamishiba_foto";

    let cacheJadwal = {};

    async function loadJadwal() {
        const group = document.getElementById('filterGroupJadwal').value;
        const sel = document.getElementById('selectJadwal');
        if(!group) return;
        
        const snap = await db.collection('jadwal_audit')
            .where('group', '==', group)
            .where('status', '==', 'Pending').get();
            
        sel.innerHTML = '<option value="">-- Pilih Jadwal --</option>';
        snap.forEach(doc => {
            cacheJadwal[doc.id] = doc.data();
            sel.innerHTML += `<option value="${doc.id}">${doc.data().periode} | ${doc.data().auditor}</option>`;
        });
    }

    function fillJadwalData(id) {
        if(!id) return;
        const d = cacheJadwal[id];
        document.getElementById('displayAuditor').value = d.auditor;
        document.getElementById('displayDept').value = d.auditee;
        document.getElementById('judulIK').value = d.judulIK || 'Materi Belum Diisi Admin';
        hitungNilai();
    }

    function hitungNilai() {
        const i = parseFloat(document.getElementById('jmlItem').value) || 0;
        const t = parseFloat(document.getElementById('jmlTemuan').value) || 0;
        document.getElementById('nilaiTemuan').value = i > 0 ? ((1-(t/i))*100).toFixed(2) + "%" : "0%";
    }

    async function uploadImage(input, idx) {
        const file = input.files[0];
        if(!file) return;
        const fd = new FormData();
        fd.append('file', file); fd.append('upload_preset', CLOUDINARY_PRESET);
        const res = await fetch(CLOUDINARY_URL, { method: 'POST', body: fd });
        const data = await res.json();
        document.getElementById(`url${idx}`).value = data.secure_url;
        document.getElementById(`img${idx}`).src = data.secure_url;
        document.getElementById(`img${idx}`).style.display = 'block';
        document.getElementById(`txt${idx}`).style.display = 'none';
    }

    document.getElementById('auditForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('selectJadwal').value;
        const btn = document.getElementById('btnSave');
        btn.disabled = true;

        const auditData = {
            tglAudit: document.getElementById('tglAudit').value,
            namaAuditeePerson: document.getElementById('namaAuditee').value,
            jmlItem: document.getElementById('jmlItem').value,
            jmlTemuan: document.getElementById('jmlTemuan').value,
            nilaiPencapaian: document.getElementById('nilaiTemuan').value,
            statusVerifikasi: document.getElementById('statusVerifikasi').value,
            uraian: document.getElementById('uraian').value,
            tindakan: document.getElementById('tindakan').value,
            foto: [1,2,3,4,5].map(i => document.getElementById(`url${i}`).value).filter(v => v),
            status: "Selesai",
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        await db.collection('jadwal_audit').doc(id).update(auditData);
        alert("Data Berhasil Disimpan!");
        location.reload();
    };

    async function fetchHistory() {
        const snap = await db.collection('jadwal_audit').where('status', '==', 'Selesai').orderBy('updatedAt', 'desc').limit(10).get();
        const body = document.getElementById('historyBody');
        snap.forEach(doc => {
            const d = doc.data();
            let imgs = (d.foto || []).map(u => `<img src="${u}" class="thumb-img">`).join('');
            body.innerHTML += `<tr>
                <td>${d.tglAudit}</td>
                <td>${d.auditee}</td>
                <td>${d.auditor}</td>
                <td>${d.judulIK || '-'}</td>
                <td>${d.nilaiPencapaian}</td>
                <td>${imgs}</td>
                <td>${d.statusVerifikasi}</td>
            </tr>`;
        });
    }
    fetchHistory();
</script>
</body>
</html>
