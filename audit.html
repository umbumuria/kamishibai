<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Hasil Audit - Kamishibai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Animasi Sidebar untuk Mobile */
        #sidebar { transition: transform 0.3s ease-in-out; }
        @media (max-width: 1024px) {
            #sidebar.hidden-mobile { transform: translateX(-100%); }
            #sidebar.show-mobile { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    
    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

    <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-72 bg-slate-900 text-white flex flex-col z-50 hidden-mobile lg:transform-none">
        <div class="p-8 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl"><i data-lucide="clipboard-check" class="w-6 h-6"></i></div>
                <h1 class="font-bold text-xl uppercase tracking-tighter">Kamishibai</h1>
            </div>
            <button onclick="toggleMenu()" class="lg:hidden text-slate-400 hover:text-white">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
            </a>
            <a href="audit.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium">
                <i data-lucide="file-edit" class="w-5 h-5"></i> Input Hasil Audit
            </a>
            <a href="jadwal.html" id="nav-admin" class="hidden flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm font-medium">
                <i data-lucide="table-2" class="w-5 h-5"></i> Atur Jadwal
            </a>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-2 text-red-400 hover:bg-red-400/10 rounded-xl transition-colors text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Keluar
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        
        <header class="h-20 bg-white border-b border-slate-200 px-4 sm:px-8 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="lg:hidden p-2 bg-slate-100 rounded-lg text-slate-600">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 class="font-black text-sm sm:text-lg text-slate-800 uppercase tracking-tight truncate">INPUT HASIL AUDIT</h2>
            </div>
            
            <div class="flex items-center gap-3">
                <div class="text-right hidden sm:block">
                    <p id="role-display" class="text-[10px] font-bold text-slate-400 uppercase leading-none">Auditor</p>
                    <p class="text-xs font-bold text-slate-800">User Active</p>
                </div>
                <div class="w-10 h-10 bg-blue-100 border border-blue-200 rounded-full flex items-center justify-center text-blue-600">
                    <i data-lucide="user" class="w-5 h-5"></i>
                </div>
            </div>
        </header>

        <div class="p-4 sm:p-8 flex-1 overflow-y-auto">
            <div class="bg-white p-6 sm:p-10 rounded-[2rem] sm:rounded-[2.5rem] border border-slate-100 shadow-sm max-w-4xl mx-auto">
                
                <div class="mb-8 text-center">
                    <h3 class="text-xl font-bold text-slate-800">Cari Jadwal Audit</h3>
                    <p class="text-sm text-slate-400">Pilih jadwal Anda untuk menginput hasil</p>
                </div>

                <div class="relative mb-8">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input type="text" class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 transition-all" placeholder="Cari nama auditor atau departemen...">
                </div>

                <div class="space-y-4">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-blue-200 transition-colors">
                        <div class="flex gap-4 items-center">
                            <div class="bg-blue-600/10 p-3 rounded-xl text-blue-600 hidden sm:block">
                                <i data-lucide="calendar" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md uppercase">GROUP A</span>
                                    <span class="text-[9px] font-black px-2 py-0.5 bg-slate-200 text-slate-600 rounded-md uppercase">24 MEI 2024</span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-lg leading-tight">Production Dept.</h4>
                                <p class="text-xs text-slate-500 flex items-center gap-1 mt-1">
                                    <i data-lucide="user" class="w-3 h-3"></i> Auditor: John Doe
                                </p>
                            </div>
                        </div>
                        <button class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">
                            Pilih
                        </button>
                    </div>

                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-blue-200 transition-colors">
                        <div class="flex gap-4 items-center">
                            <div class="bg-blue-600/10 p-3 rounded-xl text-blue-600 hidden sm:block">
                                <i data-lucide="calendar" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black px-2 py-0.5 bg-blue-100 text-blue-700 rounded-md uppercase">GROUP B</span>
                                    <span class="text-[9px] font-black px-2 py-0.5 bg-slate-200 text-slate-600 rounded-md uppercase">25 MEI 2024</span>
                                </div>
                                <h4 class="font-bold text-slate-800 text-lg leading-tight">Quality Control</h4>
                                <p class="text-xs text-slate-500 flex items-center gap-1 mt-1">
                                    <i data-lucide="user" class="w-3 h-3"></i> Auditor: Jane Smith
                                </p>
                            </div>
                        </div>
                        <button class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg shadow-blue-100 transition-all active:scale-95">
                            Pilih
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // Fungsi untuk buka-tutup menu mobile
        ffunction toggleMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    sidebar.classList.toggle('sidebar-closed');
    sidebar.classList.toggle('sidebar-open');
    overlay.classList.toggle('hidden');
}

        // Cek Role Admin
        const role = localStorage.getItem('kamishibai_role');
        if(role === 'admin') {
            document.getElementById('nav-admin').classList.remove('hidden');
            document.getElementById('role-display').innerText = 'Administrator';
        }

        // Logout
        window.logout = () => { 
            localStorage.clear(); 
            window.location.href = 'index.html'; 
        };

        // Jalankan Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
