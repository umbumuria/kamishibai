<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Audit 5R - CIQA System</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --danger: #ef4444; --success: #10b981; --safety: #f59e0b; --saving: #06b6d4; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; border-left: 5px solid var(--primary); padding-left: 15px; color: var(--primary); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }

        input, select, textarea { 
            width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); 
            border-radius: 10px; font-size: 14px; box-sizing: border-box; outline: none; 
        }
        
        .question-card { background: #fff; border: 1px solid var(--border); padding: 15px; border-radius: 12px; margin-bottom: 10px; transition: 0.2s; }
        .question-card:hover { border-color: var(--primary); background: #f0f7ff; }
        .question-text { font-size: 14px; font-weight: 500; margin-bottom: 10px; display: block; }
        
        .score-container { display: flex; justify-content: space-between; gap: 5px; }
        .score-btn { flex: 1; text-align: center; }
        .score-btn input { display: none; }
        .score-btn label { 
            display: block; padding: 8px; background: #f1f5f9; border-radius: 8px; 
            cursor: pointer; font-size: 14px; border: 1px solid transparent; transition: 0.3s;
        }
        .score-btn input:checked + label { background: var(--primary); color: white; border-color: var(--primary); }

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .photo-box { border: 2px dashed var(--border); border-radius: 10px; padding: 5px; text-align: center; cursor: pointer; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; background: #fafafa; position: relative; overflow: hidden; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; display:none; }
        .photo-box span { font-size: 10px; font-weight: bold; color: #64748b; z-index: 1; }
        
        .btn-submit { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }

        .score-panel { position: fixed; bottom: 10px; right: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 100; align-items: flex-end; }
        .chip { padding: 8px 15px; border-radius: 10px; color: white; font-weight: bold; font-size: 11px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-width: 160px; }
        .chip-main { font-size: 14px; padding: 12px 20px; border-radius: 50px; background: var(--primary); }
        .bg-5r { background: var(--success); }
        .bg-safety { background: var(--safety); }
        .bg-energy { background: var(--saving); }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="score-panel">
    <div class="chip bg-5r" id="score5R">Total Point 5R: 0</div>
    <div class="chip bg-safety" id="scoreSafety">Point Safety: 0</div>
    <div class="chip bg-energy" id="scoreEnergy">Point Saving Energy: 0</div>
    <div class="chip chip-main" id="liveScore">TOTAL POINT: 0</div>
</div>

<div class="container">
    <div class="section-title">FORM AUDIT KATEGORI NON OFFICE INDOOR</div>

    <form id="auditForm">
        <div class="grid">
            <div><label>Pilih Group</label>
                <select id="group" required onchange="toggleCategory()">
                    <option value="">-- Pilih Group --</option>
                    <option value="SF">Sugar Factory</option>
                    <option value="PLANTATION">Plantation</option>
                </select>
            </div>
            <div><label>Periode Audit</label><input type="month" id="periode" required></div>
            
            <div><label>Area Audit</label><input type="text" id="areaDetail" required></div>
            <div><label>Nama Auditor</label><input type="text" id="auditor" required></div>
            <div><label>Nama Auditee</label><input type="text" id="auditee" required></div>
            <div><label>Tanggal Audit</label><input type="date" id="tglAudit" required></div>
        </div>

        <hr style="border: 0.5px solid var(--border); margin: 20px 0;">

        <div id="questionsWrapper">
            <div style="text-align: center; color: #64748b; padding: 40px;">
                Silahkan pilih <b>Group</b> untuk memunculkan daftar pertanyaan audit.
            </div>
        </div>

        <div class="section-title">Dokumentasi Temuan & Foto Bersama</div>
        <div class="photo-grid">
            <script>
                for(let i=1; i<=7; i++) {
                    document.write(`
                        <div class="photo-box" onclick="document.getElementById('file${i}').click()">
                            <img id="prev${i}">
                            <span>FOTO TEMUAN ${i}</span>
                            <input type="file" id="file${i}" accept="image/*" hidden onchange="preview(this, ${i})">
                        </div>
                    `);
                }
            </script>
            <div class="photo-box" onclick="document.getElementById('fileBersama').click()" style="border-color: var(--success);">
                <img id="prevBersama">
                <span style="color: var(--success);">FOTO BERSAMA</span>
                <input type="file" id="fileBersama" accept="image/*" hidden onchange="preview(this, 'Bersama')">
            </div>
        </div>

        <div class="grid">
            <script>
                for(let i=1; i<=7; i++) {
                    document.write(`<div><label>Ket. Temuan ${i}</label><input type="text" id="ket${i}" placeholder="..."></div>`);
                }
            </script>
        </div>

        <button type="submit" class="btn-submit">SIMPAN HASIL AUDIT 5R</button>
    </form>
</div>

<script>
    const auditData = {
        "SF": [
            {cat: "RINGKAS", q: "Apakah barang yang tidak digunakan sudah dipisahkan dari area kerja?"},
            {cat: "RINGKAS", q: "Apakah hanya barang penting yang ada di area kerja?"},
            {cat: "RINGKAS", q: "Apakah barang bekas atau rusak langsung dipindahkan?"},
            {cat: "RINGKAS", q: "Apakah ada tempat khusus untuk barang tak terpakai?"},
            {cat: "RINGKAS", q: "Apakah area kerja terlihat lapang tanpa barang menumpuk?"},
            {cat: "RAPI", q: "Apakah barang dan alat disimpan di tempat yang sudah ditentukan?"},
            {cat: "RAPI", q: "Apakah semua tempat penyimpanan diberi label atau tanda?"},
            {cat: "RAPI", q: "Apakah alat mudah diambil dan dikembalikan ke tempat semula?"},
            {cat: "RAPI", q: "Apakah kabel, selang, dan alat tidak berserakan di lantai?"},
            {cat: "RAPI", q: "Apakah jalur jalan dan area kerja tidak tertutup barang?"},
            {cat: "RESIK", q: "Apakah area bebas dari sampah dan debu?"},
            {cat: "RESIK", q: "Apakah tidak ada tumpahan (air, minyak, bahan kimia)?"},
            {cat: "RESIK", q: "Apakah alat kebersihan tersedia dan digunakan?"},
            {cat: "RESIK", q: "Apakah ada jadwal piket atau tanggung jawab kebersihan?"},
            {cat: "RESIK", q: "Apakah tempat sampah tersedia dan tidak penuh?"},
            {cat: "RAWAT", q: "Apakah alat kerja dalam kondisi baik dan tidak rusak?"},
            {cat: "RAWAT", q: "Apakah tanda atau label alat kerja terlihat jelas dan tidak pudar?"},
            {cat: "RAWAT", q: "Apakah layout area (garis, label, line marking) terlihat jelas dan terawat?"},
            {cat: "RAWAT", q: "Apakah ada jadwal perawatan alat dan terlihat di lokasi?"},
            {cat: "RAWAT", q: "Apakah kerusakan segera diperbaiki dan tidak dibiarkan?"},
            {cat: "RAJIN", q: "Apakah kebersihan dan kerapian dijaga setiap hari?"},
            {cat: "RAJIN", q: "Apakah pekerja merapikan area kerja setelah digunakan tanpa disuruh?"},
            {cat: "RAJIN", q: "Apakah papan monitoring atau checklist 5R diperbarui rutin?"},
            {cat: "RAJIN", q: "Apakah hasil audit 5R ditindaklanjuti?"},
            {cat: "RAJIN", q: "Apakah kebiasaan 5R berjalan tanpa perlu diawasi terus?"},
            {cat: "SAFETY", q: "Apakah jalur evakuasi dan APAR tidak terhalang dan mudah diakses?"},
            {cat: "SAFETY", q: "Apakah semua pekerja memakai alat pelindung diri (APD) sesuai kebutuhan?"},
            {cat: "SAFETY", q: "Apakah tidak ada kabel terbuka, mesin tanpa pelindung, atau bahaya listrik?"},
            {cat: "SAFETY", q: "Apakah tanda peringatan keselamatan jelas dan mudah dibaca?"},
            {cat: "SAFETY", q: "Apakah kondisi lantai aman dari licin, lubang, atau genangan?"},
            {cat: "SAVING ENERGY", q: "Apakah lampu dan peralatan listrik dimatikan jika tidak digunakan?"},
            {cat: "SAVING ENERGY", q: "Apakah AC, kipas, atau exhaust hanya menyala saat dibutuhkan?"},
            {cat: "SAVING ENERGY", q: "Apakah tidak ada kebocoran udara di sistem kompresor atau valve?"},
            {cat: "SAVING ENERGY", q: "Apakah penggunaan mesin dan peralatan diatur agar efisien?"},
            {cat: "SAVING ENERGY", q: "Apakah ada himbauan atau poster hemat energi di area kerja?"}
        ]
    };

    function toggleCategory() {
        const grp = document.getElementById('group').value;
        const wrapper = document.getElementById('questionsWrapper');
        if(!grp) return;

        let key = "SF"; 
        let html = '';
        auditData[key].forEach((item, i) => {
            html += `
                <div class="question-card" data-category="${item.cat}">
                    <span class="question-text"><b>[${item.cat}]</b> ${item.q}</span>
                    <div class="score-container">
                        ${[0,1,2,3,4].map(v => `
                            <div class="score-btn">
                                <input type="radio" name="q${i}" id="q${i}_${v}" value="${v}" onchange="calcScore()" required>
                                <label for="q${i}_${v}">${v}</label>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        });
        wrapper.innerHTML = html;
        calcScore();
    }

    function calcScore() {
        let scores = { "RINGKAS":0, "RAPI":0, "RESIK":0, "RAWAT":0, "RAJIN":0, "SAFETY":0, "SAVING ENERGY":0 };

        document.querySelectorAll('.question-card').forEach((card) => {
            const cat = card.getAttribute('data-category');
            const selected = card.querySelector('input[type="radio"]:checked');
            if(selected) {
                scores[cat] += parseInt(selected.value);
            }
        });

        // 5R Calculation (Raw Total)
        let total5RScore = scores["RINGKAS"] + scores["RAPI"] + scores["RESIK"] + scores["RAWAT"] + scores["RAJIN"];
        
        // Safety & Energy (Raw Total)
        let safetyScore = scores["SAFETY"];
        let energyScore = scores["SAVING ENERGY"];

        // Grand Total Point
        let grandTotalPoint = total5RScore + safetyScore + energyScore;

        // Update UI
        document.getElementById('score5R').innerHTML = `
            RINGKAS: ${scores["RINGKAS"]} | RAPI: ${scores["RAPI"]} | RESIK: ${scores["RESIK"]} <br>
            RAWAT: ${scores["RAWAT"]} | RAJIN: ${scores["RAJIN"]} <br>
            <b>TOTAL POINT 5R: ${total5RScore}</b>
        `;
        document.getElementById('scoreSafety').innerText = `POINT SAFETY: ${safetyScore}`;
        document.getElementById('scoreEnergy').innerText = `POINT SAVING ENERGY: ${energyScore}`;
        document.getElementById('liveScore').innerText = `TOTAL POINT: ${grandTotalPoint}`;
    }

    function preview(input, id) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('prev'+id).src = e.target.result;
                document.getElementById('prev'+id).style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('auditForm').onsubmit = function(e) {
        e.preventDefault();
        alert("Data Audit Terkirim ke Sistem CIQA!");
    };
</script>

</body>
</html>
